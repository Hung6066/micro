global:
  resolve_timeout: 5m

route:
  group_by: ['severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://systemdashboard-bff:5700/api/alerts/webhook'
        send_resolved: true
