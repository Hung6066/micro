# His.Hope Dashboard Alerting Rules — Docker Compose Dev
# Sends alerts to AlertManager for auto-remediation

groups:
  - name: his-hope.alerts
    interval: 15s
    rules:
      # ─── Service Down ───
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Instance {{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      # ─── High Error Rate ───
      - alert: HighErrorRate
        expr: |
          sum by (job) (rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
          /
          sum by (job) (rate(http_server_request_duration_seconds_count{}[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.job }}."

      # ─── SLO Error Budget Burn Critical ───
      - alert: SloErrorBudgetBurnCritical
        expr: slo:burn_rate:1h > 14.4 and slo:burn_rate:6h > 14.4
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SLO error budget critical burn on {{ $labels.job }}"
          description: "Error budget burn rate critical. 1h: {{ $value | printf \"%.1f\" }}x. Service: {{ $labels.job }}."

      # ─── SLO Error Budget Burn Warning ───
      - alert: SloErrorBudgetBurnWarning
        expr: slo:burn_rate:1h > 3 and slo:burn_rate:6h > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SLO error budget warning on {{ $labels.job }}"
          description: "Error budget burn rate warning. 1h: {{ $value | printf \"%.1f\" }}x. Service: {{ $labels.job }}."

      # ─── High Latency P99 ───
      - alert: HighLatencyP99
        expr: slo:latency:p99 > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "P99 latency is {{ $value }}s on {{ $labels.job }}."

      # ─── High Memory Usage ───
      - alert: HighMemoryUsage
        expr: process_memory_usage_bytes / 1024 / 1024 > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.job }}"
          description: "Memory: {{ $value | printf \"%.0f\" }}MB on {{ $labels.instance }}."
