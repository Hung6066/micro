services:
  postgres:
    image: postgres:16-alpine
    container_name: his-hope-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: identitydb,patientdb,appointmentdb,clinicaldb,labdb,billingdb,pharmacydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 1g }
        reservations: { memory: 256m }

  postgres-replica:
    image: postgres:16-alpine
    container_name: his-hope-postgres-replica
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    depends_on:
      - postgres
    profiles: ["replica"]

  redis:
    image: redis:7-alpine
    container_name: his-hope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: his-hope-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: his-hope-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.12.0
    container_name: his-hope-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch: { condition: service_healthy }

  consul:
    image: hashicorp/consul:1.18
    container_name: his-hope-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -bind=0.0.0.0
    volumes:
      - consul_data:/consul/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: his-hope-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "6831:6831/udp"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "badger"
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_KEY: "/badger/key"
      BADGER_DIRECTORY_VALUE: "/badger/data"
    volumes:
      - jaeger_data:/badger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: his-hope-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.0
    container_name: his-hope-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Application Services
  identityservice:
    build:
      context: ..
      dockerfile: src/Services/IdentityService/IdentityService.Api/Dockerfile
    container_name: his-hope-identity
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__IdentityDb: Host=postgres;Database=identitydb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Key: ${JWT_KEY:-super-secret-key-his-hope-2024-at-least-32-chars!}
      Jwt__Issuer: his-hope-identity
      Jwt__Expiry: "08:00:00"
      Redis__ConnectionString: redis:6379
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  patientservice:
    build:
      context: ..
      dockerfile: src/Services/PatientService/PatientService.Api/Dockerfile
    container_name: his-hope-patient
    ports:
      - "5002:5002"
      - "5006:5006"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__PatientDb: Host=postgres;Database=patientdb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      EventBus__HostName: rabbitmq
      EventBus__UserName: ${RABBITMQ_USER:-admin}
      EventBus__Password: ${RABBITMQ_PASSWORD:-admin}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: his-hope-identity
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  appointmentservice:
    build:
      context: ..
      dockerfile: src/Services/AppointmentService/AppointmentService.Api/Dockerfile
    container_name: his-hope-appointment
    ports:
      - "5003:5003"
      - "5007:5007"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5003
      ConnectionStrings__AppointmentDb: Host=postgres;Database=appointmentdb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      GrpcServices__PatientService: http://patientservice:5006
      EventBus__HostName: rabbitmq
      EventBus__UserName: ${RABBITMQ_USER:-admin}
      EventBus__Password: ${RABBITMQ_PASSWORD:-admin}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: his-hope-identity
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      patientservice: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  clinicalservice:
    build:
      context: ..
      dockerfile: src/Services/ClinicalService/ClinicalService.Api/Dockerfile
    container_name: his-hope-clinical
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__ClinicalDb: Host=postgres;Database=clinicaldb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      GrpcServices__PatientService: http://patientservice:5006
      GrpcServices__AppointmentService: http://appointmentservice:5007
      EventBus__HostName: rabbitmq
      EventBus__UserName: ${RABBITMQ_USER:-admin}
      EventBus__Password: ${RABBITMQ_PASSWORD:-admin}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: his-hope-identity
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      patientservice: { condition: service_healthy }
      appointmentservice: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  labservice:
    build:
      context: ..
      dockerfile: src/Services/LabService/LabService.Api/Dockerfile
    container_name: his-hope-lab
    ports:
      - "5010:5010"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5010
      ConnectionStrings__LabDb: Host=postgres;Database=labdb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      GrpcServices__PatientService: http://patientservice:5006
      GrpcServices__ClinicalService: http://clinicalservice:5004
      EventBus__HostName: rabbitmq
      EventBus__UserName: ${RABBITMQ_USER:-admin}
      EventBus__Password: ${RABBITMQ_PASSWORD:-admin}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: his-hope-identity
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5010/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  billingservice:
    build:
      context: ..
      dockerfile: src/Services/BillingService/BillingService.Api/Dockerfile
    container_name: his-hope-billing
    ports:
      - "5020:5020"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5020
      ConnectionStrings__BillingDb: Host=postgres;Database=billingdb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      GrpcServices__PatientService: http://patientservice:5006
      GrpcServices__AppointmentService: http://appointmentservice:5007
      GrpcServices__LabService: http://labservice:5010
      GrpcServices__PharmacyService: http://pharmacyservice:5030
      EventBus__HostName: rabbitmq
      EventBus__UserName: ${RABBITMQ_USER:-admin}
      EventBus__Password: ${RABBITMQ_PASSWORD:-admin}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: his-hope-identity
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5020/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  pharmacyservice:
    build:
      context: ..
      dockerfile: src/Services/PharmacyService/PharmacyService.Api/Dockerfile
    container_name: his-hope-pharmacy
    ports:
      - "5030:5030"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5030
      ConnectionStrings__PharmacyDb: Host=postgres;Database=pharmacydb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      GrpcServices__PatientService: http://patientservice:5006
      GrpcServices__ClinicalService: http://clinicalservice:5004
      EventBus__HostName: rabbitmq
      EventBus__UserName: ${RABBITMQ_USER:-admin}
      EventBus__Password: ${RABBITMQ_PASSWORD:-admin}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: his-hope-identity
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5030/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  apigateway:
    build:
      context: ..
      dockerfile: src/ApiGateway/Dockerfile
    container_name: his-hope-gateway
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
    depends_on:
      identityservice: { condition: service_healthy }
      patientservice: { condition: service_healthy }
      appointmentservice: { condition: service_healthy }
      clinicalservice: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../src/Frontend/his-hope-app
    container_name: his-hope-frontend
    ports:
      - "8081:8080"
    depends_on:
      apigateway: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Certificate Generator (one-time)
  certgen:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: his-hope-certgen
    profiles: ["setup"]
    volumes:
      - certs_data:/certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        dotnet dev-certs https --export-path /certs/server.pfx --password "${CERT_PASSWORD:-his-hope-dev}" --format Pfx &&
        dotnet dev-certs https --trust &&
        echo "Certificates generated"
    restart: "no"

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  rabbitmq_data:
  es_data:
  consul_data:
  jaeger_data:
  prometheus_data:
  grafana_data:
  certs_data:
