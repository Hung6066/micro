training:
  project: his-hope-analytics
  region: us-east1
  display_name: no-show-predictor-v1
  model_type: xgboost

  dataset:
    source: bigquery
    query: |
      SELECT * FROM `his-hope-analytics.ml_features.no_show_training`
    split:
      training: 0.8
      validation: 0.1
      test: 0.1

  parameters:
    objective: binary:logistic
    eval_metric: auc
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 20

  serving:
    machine_type: n1-standard-4
    min_replicas: 1
    max_replicas: 5
    traffic_split:
      - 100%

  schedule:
    frequency: weekly
    day: MONDAY
    time: "02:00"
