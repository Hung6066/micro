apiVersion: aiplatform/v1
kind: Endpoint
metadata:
  name: his-hope-ml-endpoint
  region: us-east1
spec:
  models:
    - name: no-show-predictor
      version: "1"
      traffic_percentage: 100
      deployment:
        machine_type: n1-standard-4
        min_replica_count: 1
        max_replica_count: 5
        autoscaling_metric_specs:
          - metric_name: aiplatform.googleapis.com/prediction/request_count
            target: 100
        disable_container_logging: false

    - name: readmission-predictor
      version: "1"
      traffic_percentage: 100
      deployment:
        machine_type: n1-standard-4
        min_replica_count: 1
        max_replica_count: 10

    - name: icd10-suggester
      version: "1"
      traffic_percentage: 100
      deployment:
        machine_type: n1-highmem-8
        accelerator: NVIDIA_TESLA_T4
        min_replica_count: 1
        max_replica_count: 3
