# =============================================================================
# Prophet Predictive Auto-Scaler — Configuration
# =============================================================================
# Controls training & prediction for all 8 backend services.
# Prometheus address is injected via environment variable at runtime
# (overrides the default below).

prometheus_url: "http://prometheus-k8s.monitoring.svc.cluster.local:9090"

model_dir: "/models"                      # PVC mount point inside container

# ── Service scaling parameters ────────────────────────────────────────────
# Each service has its own target requests/sec per pod, safety floor, and
# ceiling. The safety floor matches the existing HPA minReplicas so the
# predictor never overrides the minimum safe operating level.
services:
  - name: api-gateway
    target_rps_per_pod: 1000
    min_replicas_lower_bound: 2
    max_replicas_upper_bound: 10

  - name: patient-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 3
    max_replicas_upper_bound: 30

  - name: appointment-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 3
    max_replicas_upper_bound: 20

  - name: clinical-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 2
    max_replicas_upper_bound: 15

  - name: identity-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 2
    max_replicas_upper_bound: 10

  - name: lab-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 2
    max_replicas_upper_bound: 15

  - name: billing-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 2
    max_replicas_upper_bound: 10

  - name: pharmacy-service
    target_rps_per_pod: 500
    min_replicas_lower_bound: 2
    max_replicas_upper_bound: 10

# ── Training hyperparameters ──────────────────────────────────────────────
training:
  history_days: 14                         # Window of Prometheus data to train on
  data_interval_minutes: 5                 # Prometheus scrape interval
  seasonality_mode: additive               # additive | multiplicative
  changepoint_prior_scale: 0.05            # Trend flexibility (higher = more adaptive)
  seasonality_prior_scale: 10.0            # Seasonality strength
  daily_seasonality: true                  # Hour-of-day patterns
  weekly_seasonality: true                 # Day-of-week patterns
  yearly_seasonality: false                # Not enough data for yearly patterns
  uncertainty_samples: 1000                # CI bootstrap samples (lower = faster)

# ── Prediction parameters ─────────────────────────────────────────────────
prediction:
  forecast_steps: 12                       # 12 × 5 min = 60 minutes ahead
  interval_width: 0.80                     # 80% prediction interval (use upper bound)
  retrain_if_model_older_hours: 24         # Auto-retrain if model is stale
