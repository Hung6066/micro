# Micro Workflow Angular Major Upgrade

## Action

Follow the angular-major-upgrade workflow:
1. Update package.json and package-lock.json to new Angular version
2. Update Angular CLI and core packages
3. Update Angular Material and CDK packages
4. Update NgRx packages
5. Update application code and tests to be compatible with new Angular version
6. Update styles/themes if needed
7. Update build configuration (e.g., switch builder)
8. Update Dockerfile or auxiliary build/deploy scripts if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/Frontend/his-hope-app/package.json, src/Frontend/his-hope-app/package-lock.json, src/Frontend/his-hope-app/src/app/**/*.ts

