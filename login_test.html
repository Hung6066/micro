<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sign in — His.Hope HIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Material+Icons&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Roboto',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;font-weight:400;line-height:1.428;
  color:rgba(0,0,0,0.87);background:#fafafa;
  -webkit-font-smoothing:antialiased
}
.login-page{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:16px;
  background:linear-gradient(135deg,#3f51b5 0%,#303f9f 100%)
}
.mat-card{
  width:100%;max-width:400px;background:#fff;border-radius:4px;
  box-shadow:0 5px 5px -3px rgba(0,0,0,0.2),0 8px 10px 1px rgba(0,0,0,0.14),0 3px 14px 2px rgba(0,0,0,0.12);
  overflow:hidden;
  animation:card-in 0.3s cubic-bezier(0.4,0,0.2,1)
}
@keyframes card-in{
  from{opacity:0;transform:translateY(24px) scale(0.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.mat-card-header{
  background:linear-gradient(135deg,#3f51b5,#303f9f);
  color:#fff;padding:32px 24px 24px;text-align:center
}
.mat-card-header .material-icons{font-size:48px;width:48px;height:48px;margin-bottom:12px;opacity:0.9}
.mat-card-header .mat-title{font-size:24px;font-weight:400;margin:0 0 4px;letter-spacing:0.25px}
.mat-card-header .mat-subtitle{font-size:14px;font-weight:300;opacity:0.8;letter-spacing:0.1px}
.mat-card-content{padding:24px}
.mat-error{
  display:flex;align-items:center;gap:8px;padding:10px 14px;margin-bottom:16px;
  background:#fbe9e7;color:#f44336;border-radius:4px;font-size:13px;
  animation:shake 0.4s ease
}
@keyframes shake{
  0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}
}
.mat-error .material-icons{font-size:18px;width:18px;height:18px;flex-shrink:0}
.form-field{display:block;margin-bottom:20px;position:relative}
.form-label{display:block;font-size:12px;font-weight:500;color:rgba(0,0,0,0.6);margin-bottom:6px;letter-spacing:0.4px;text-transform:uppercase}
.field-wrap{position:relative}
.field-wrap input{
  width:100%;height:48px;padding:0 12px 0 44px;
  border:1px solid rgba(0,0,0,0.12);border-radius:4px 4px 0 0;
  font-family:'Roboto',sans-serif;font-size:16px;font-weight:400;
  color:rgba(0,0,0,0.87);background:rgba(0,0,0,0.02);
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s
}
.field-wrap input::placeholder{color:rgba(0,0,0,0.38)}
.field-wrap input:hover{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.38)}
.field-wrap input:focus{background:transparent;border-color:#3f51b5;border-width:2px;padding:0 11px 0 43px;box-shadow:inset 0 -2px 0 #3f51b5}
.field-wrap input:focus+.field-underline{transform:scaleX(1)}
.field-underline{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:#3f51b5;transform:scaleX(0);
  transition:transform .2s cubic-bezier(0.4,0,0.2,1)
}
.field-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:rgba(0,0,0,0.38);font-size:20px;pointer-events:none;transition:color .2s
}
.field-wrap input:focus~.field-icon{color:#3f51b5}
.mat-flat-button{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;min-height:36px;padding:0 16px;border:none;border-radius:4px;
  font-family:'Roboto',sans-serif;font-size:14px;font-weight:500;
  letter-spacing:0.75px;text-transform:uppercase;cursor:pointer;
  background:#3f51b5;color:#fff;
  box-shadow:0 3px 1px -2px rgba(0,0,0,0.2),0 2px 2px 0 rgba(0,0,0,0.14),0 1px 5px 0 rgba(0,0,0,0.12);
  transition:background .2s,box-shadow .2s;user-select:none;
  position:relative;overflow:hidden
}
.mat-flat-button:hover{background:#3949ab;box-shadow:0 2px 4px -1px rgba(0,0,0,0.2),0 4px 5px 0 rgba(0,0,0,0.14),0 1px 10px 0 rgba(0,0,0,0.12)}
.mat-flat-button:active{background:#303f9f;box-shadow:0 5px 5px -3px rgba(0,0,0,0.2),0 8px 10px 1px rgba(0,0,0,0.14),0 3px 14px 2px rgba(0,0,0,0.12)}
.mat-flat-button .material-icons{font-size:18px;width:18px;height:18px}
.external-section{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.mat-stroked-button{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;min-height:36px;padding:0 16px;
  border:1px solid rgba(0,0,0,0.12);border-radius:4px;
  font-family:'Roboto',sans-serif;font-size:14px;font-weight:500;
  color:rgba(0,0,0,0.87);background:transparent;cursor:pointer;
  letter-spacing:0.25px;transition:background .2s
}
.mat-stroked-button:hover{background:rgba(0,0,0,0.04)}
.mat-stroked-button .material-icons{font-size:18px;width:18px;height:18px}
.login-footer{text-align:center;padding:24px 0 0;font-size:12px;font-weight:400;color:rgba(255,255,255,0.7)}
.login-footer strong{color:#fff;font-weight:500}
</style>
</head>
<body>
<div class="login-page">
  <div class="mat-card">
    <div class="mat-card-header">
      <span class="material-icons">local_hospital</span>
      <h1 class="mat-title">His.Hope</h1>
      <p class="mat-subtitle">Hospital Information System</p>
    </div>
    <div class="mat-card-content">
      
      <form method="post" action="/Account/Login" autocomplete="off">
        <input type="hidden" name="returnUrl" value="/"/>
        <div class="form-field">
          <label class="form-label" for="email">Email</label>
          <div class="field-wrap">
            <input type="email" id="email" name="email" placeholder="you@hospital.vn" required autocomplete="username"/>
            <span class="material-icons field-icon">email</span>
            <span class="field-underline"></span>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <div class="field-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
            <span class="material-icons field-icon">lock</span>
            <span class="field-underline"></span>
          </div>
        </div>
        <button type="submit" class="mat-flat-button">
          <span class="material-icons">login</span>
          Sign in
        </button>
      </form>
      
    </div>
  </div>
  <div class="login-footer">
    <strong>His.Hope</strong> v1.0 &bull; HIPAA-Compliant Security
  </div>
</div>
</body>
</html>
