<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="app-title">His.Hope Dashboard</span>

  <span class="toolbar-spacer"></span>

  <app-alert-panel></app-alert-panel>

  <button mat-icon-button (click)="toggleTheme()" aria-label="Toggle dark mode">
    <mat-icon>brightness_6</mat-icon>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item *ngIf="isAuthenticated$ | async" (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
    <button mat-menu-item *ngIf="!(isAuthenticated$ | async)" (click)="onLogin()">
      <mat-icon>login</mat-icon>
      <span>Login</span>
    </button>
  </mat-menu>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav
    [mode]="(isMobile$ | async) ? 'over' : 'side'"
    [opened]="sidenavOpened$ | async"
    class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/resources" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dns</mat-icon>
        <span matListItemTitle>Resources</span>
      </a>
      <a mat-list-item routerLink="/logs" routerLinkActive="active-link">
        <mat-icon matListItemIcon>article</mat-icon>
        <span matListItemTitle>Logs</span>
      </a>
      <a mat-list-item routerLink="/traces" routerLinkActive="active-link">
        <mat-icon matListItemIcon>timeline</mat-icon>
        <span matListItemTitle>Traces</span>
      </a>
      <a mat-list-item routerLink="/slo" routerLinkActive="active-link">
        <mat-icon matListItemIcon>speed</mat-icon>
        <span matListItemTitle>SLO</span>
      </a>
      <a mat-list-item routerLink="/metrics" routerLinkActive="active-link">
        <mat-icon matListItemIcon>monitoring</mat-icon>
        <span matListItemTitle>Metrics</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
