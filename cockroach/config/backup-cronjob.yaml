apiVersion: v1
kind: ServiceAccount
metadata:
  name: cockroach-backup
  namespace: his-hope
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cockroach-backup
  namespace: his-hope
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cockroach-backup
  namespace: his-hope
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cockroach-backup
subjects:
- kind: ServiceAccount
  name: cockroach-backup
  namespace: his-hope
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cockroach-backup
  namespace: his-hope
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cockroach-backup
          containers:
          - name: backup
            image: cockroachdb/cockroach:v24.1.2
            imagePullPolicy: IfNotPresent
            env:
            - name: BACKUP_DATE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.creationTimestamp
            - name: COCKROACH_HOST
              value: cockroachdb-public:26257
            - name: S3_BUCKET
              value: hishope-backups
            command:
            - /bin/bash
            - -c
            - |
              BACKUP_DATE=$(date +%Y-%m-%d)
              exec /scripts/backup.sh
            volumeMounts:
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: scripts
            configMap:
              name: cockroach-backup-config
              defaultMode: 0755
          restartPolicy: OnFailure
