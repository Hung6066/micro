apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: his-hope-

commonLabels:
  app.kubernetes.io/part-of: his-hope
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: latest

commonAnnotations:
  linkerd.io/inject: enabled

resources:
  - namespace.yaml
  - patient-service.yaml
  - identity-service.yaml
  - appointment-service.yaml
  - clinical-service.yaml
  - clinical-bff.yaml
  - lab-service.yaml
  - lab-bff.yaml
  - pharmacy-bff.yaml
  - billing-service.yaml
  - pharmacy-service.yaml
  - api-gateway.yaml
  - frontend.yaml
  - systemdashboard-bff-deployment.yaml
  - systemdashboard-bff-service.yaml
  - dashboard-app-deployment.yaml
  - dashboard-app-service.yaml
  - postgres.yaml
  - postgres-secret.yaml
  - rabbitmq.yaml
  - redis.yaml
  - ../linkerd/server.yaml
  - ../linkerd/server-authorization.yaml
  - ../linkerd/traffic-split.yaml
  - ../linkerd/service-profiles.yaml
  - ../linkerd/pod-monitor.yaml
  - network-policies.yaml
  - seccomp-profiles.yaml
  - seccomp-daemonset.yaml
  # PgBouncer connection pooler infrastructure
  - ../infrastructure/pgbouncer-configmap.yaml
  - ../infrastructure/pgbouncer-secret.yaml
  # Unleash feature flag service
  - ../infrastructure/unleash-deployment.yaml
  # 5-tier request priority classes (P0–P4)
  - ../priority/priority-classes.yaml

patches:
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=his-hope"
    patch: |-
      - op: add
        path: /spec/template/metadata/annotations/linkerd.io~1inject
        value: enabled
