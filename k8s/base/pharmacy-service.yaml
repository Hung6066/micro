apiVersion: v1
kind: ServiceAccount
metadata:
  name: pharmacy-service
  labels:
    app.kubernetes.io/name: pharmacy-service
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pharmacy-service-config
  labels:
    app.kubernetes.io/name: pharmacy-service
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: "http://0.0.0.0:5030;https://0.0.0.0:5031"
  ConnectionStrings__PharmacyDb: "Host=postgres;Port=5432;Database=pharmacydb;Username=his_hope;Password="
  RabbitMQ__Host: rabbitmq
  Redis__Connection: redis:6379
  GrpcServices__PatientService: https://patient-service:5006
  GrpcServices__ClinicalService: https://clinical-service:5009
  OpenTelemetry__JaegerEndpoint: http://jaeger:14278/api/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-service
  labels:
    app.kubernetes.io/name: pharmacy-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pharmacy-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pharmacy-service
        app.kubernetes.io/component: backend
        app: pharmacy-service
    spec:
      serviceAccountName: pharmacy-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pharmacy-service
          image: his-hope/pharmacy-service:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1654
            runAsGroup: 1654
          ports:
            - name: http
              containerPort: 5030
              protocol: TCP
            - name: grpc
              containerPort: 5032
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pharmacy-service-config
          env:
            - name: ConnectionStrings__PharmacyDb
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: pharmacy_connection_string
          resources:
            requests:
              cpu: 512m
              memory: 1Gi
            limits:
              cpu: 512m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5030
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5030
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 5030
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 40
---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-service
  labels:
    app.kubernetes.io/name: pharmacy-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pharmacy-service
  ports:
    - name: http
      port: 5030
      targetPort: 5030
      protocol: TCP
    - name: grpc
      port: 5032
      targetPort: 5032
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pharmacy-service
  labels:
    app.kubernetes.io/name: pharmacy-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pharmacy-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pharmacy-service-pdb
  labels:
    app.kubernetes.io/name: pharmacy-service
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pharmacy-service
