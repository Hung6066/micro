# =============================================================================
# His.Hope Custom Seccomp Profiles
# 
# These profiles provide an additional layer of container security by 
# restricting the Linux syscalls available to .NET application containers.
#
# USAGE:
#   These profiles must be deployed to each Kubernetes node at:
#     /var/lib/kubelet/seccomp/<profile-name>.json
#
#   Deploy via DaemonSet or use a seccomp-operator. For initial hardening,
#   the deployments use 'RuntimeDefault' (the Docker/containerd default 
#   seccomp profile). Once the custom profiles are on-disk, switch from
#   'RuntimeDefault' to 'Localhost' referencing the profile name below.
#
# REFERENCE:
#   seccompProfile:
#     type: Localhost
#     localhostProfile: his-hope-dotnet-restricted
# =============================================================================

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seccomp-profiles
  labels:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/managed-by: kustomize
data:
  # -------------------------------------------------------------------------
  # his-hope-dotnet-restricted.json
  # Purpose: Restricted profile for .NET application containers
  # Default action: Allow (syscalls not listed are denied)
  # -------------------------------------------------------------------------
