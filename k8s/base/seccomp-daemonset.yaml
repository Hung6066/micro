apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: seccomp-profile-installer
  labels:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: security
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seccomp-profile-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seccomp-profile-installer
        app.kubernetes.io/part-of: his-hope
    spec:
      initContainers:
        - name: copy-profiles
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "Installing seccomp profiles..."
              mkdir -p /host
              for f in /profiles/*.json; do
                echo "  Copying $(basename "$f")"
                cp "$f" /host/
              done
              echo "Done. Profiles installed to /var/lib/kubelet/seccomp/"
          volumeMounts:
            - name: profiles
              mountPath: /profiles
              readOnly: true
            - name: host
              mountPath: /host
      containers:
        - name: sleep
          image: busybox:1.36
          command:
            - sleep
            - infinity
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: profiles
          configMap:
            name: seccomp-profiles
        - name: host
          hostPath:
            path: /var/lib/kubelet/seccomp
            type: DirectoryOrCreate
      terminationGracePeriodSeconds: 30
