apiVersion: v1
kind: ServiceAccount
metadata:
  name: billing-service
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-service-config
  labels:
    app.kubernetes.io/name: billing-service
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: "http://0.0.0.0:5020;https://0.0.0.0:5021"
  ConnectionStrings__BillingDb: "Host=postgres;Port=5432;Database=billingdb;Username=his_hope;Password="
  RabbitMQ__Host: rabbitmq
  Redis__Connection: redis:6379
  GrpcServices__PatientService: https://patient-service:5006
  GrpcServices__AppointmentService: https://appointment-service:5008
  GrpcServices__LabService: https://lab-service:5012
  GrpcServices__PharmacyService: https://pharmacy-service:5022
  OpenTelemetry__JaegerEndpoint: http://jaeger:14278/api/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-service
        app.kubernetes.io/component: backend
        app: billing-service
    spec:
      serviceAccountName: billing-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: billing-service
          image: his-hope/billing-service:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1654
            runAsGroup: 1654
          ports:
            - name: http
              containerPort: 5020
              protocol: TCP
            - name: grpc
              containerPort: 5022
              protocol: TCP
          envFrom:
            - configMapRef:
                name: billing-service-config
          env:
            - name: ConnectionStrings__BillingDb
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: billing_connection_string
          resources:
            requests:
              cpu: 512m
              memory: 1Gi
            limits:
              cpu: 512m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5020
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5020
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 5020
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 40
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: billing-service
  ports:
    - name: http
      port: 5020
      targetPort: 5020
      protocol: TCP
    - name: grpc
      port: 5022
      targetPort: 5022
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billing-service
  labels:
    app.kubernetes.io/name: billing-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billing-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: billing-service-pdb
  labels:
    app.kubernetes.io/name: billing-service
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-service
