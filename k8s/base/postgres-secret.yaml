    app.kubernetes.io/name: postgres-secret
    app.kubernetes.io/component: database
type: Opaque
data:
  # These are placeholder values. Replace with actual Base64-encoded
  # connection strings for each database before deploying.
  #
  # IMPORTANT: With PgBouncer sidecar deployed, connection strings MUST
