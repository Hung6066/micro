apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-app
  labels:
    app.kubernetes.io/name: dashboard-app
    app.kubernetes.io/component: dashboard
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-app
  labels:
    app.kubernetes.io/name: dashboard-app
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard-app
        app.kubernetes.io/component: dashboard
        app: dashboard-app
    spec:
      serviceAccountName: dashboard-app
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard-app
          image: his-hope/dashboard-app:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 101
            runAsGroup: 101
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
