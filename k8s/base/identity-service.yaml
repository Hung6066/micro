apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-service
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  labels:
    app.kubernetes.io/name: identity-service
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: "http://0.0.0.0:5003;https://0.0.0.0:5004"
  ConnectionStrings__IdentityDb: "Host=localhost;Port=6432;Database=identitydb;Username=his_hope;Password="
  RabbitMQ__Host: rabbitmq
  Redis__Connection: redis:6379
  Consul__Address: http://consul:8500
  OpenTelemetry__JaegerEndpoint: http://jaeger:14278/api/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
        app.kubernetes.io/component: backend
        app: identity-service
    spec:
      serviceAccountName: identity-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity-service
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1654
            runAsGroup: 1654
          image: his-hope/identity-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5003
              protocol: TCP
            - name: grpc
              containerPort: 5007
              protocol: TCP
          envFrom:
            - configMapRef:
                name: identity-service-config
          env:
            - name: ConnectionStrings__IdentityDb
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: identity_connection_string
          resources:
            requests:
              cpu: 512m
              memory: 1Gi
            limits:
              cpu: 512m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 40
        # ── PgBouncer Sidecar ──────────────────────────────────────────────
        # Lightweight connection pooler for PostgreSQL/CockroachDB
        - name: pgbouncer
          image: eduburu/pgbouncer:1.22
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            runAsUser: 100
            runAsGroup: 100
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          env:
            - name: POSTGRESQL_HOST
              value: "cockroachdb-public.his-hope.svc.cluster.local"
            - name: POSTGRESQL_PORT
              value: "26257"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - pgbouncer
                - --version
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: pgbouncer-volume
              mountPath: /etc/pgbouncer
              readOnly: true
      volumes:
        - name: pgbouncer-volume
          projected:
            sources:
              - configMap:
                  name: pgbouncer-config
                  items:
                    - key: pgbouncer.ini
                      path: pgbouncer.ini
              - secret:
                  name: pgbouncer-secret
                  items:
                    - key: userlist.txt
                      path: userlist.txt
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: identity-service
  ports:
    - name: http
      port: 5003
      targetPort: 5003
      protocol: TCP
    - name: grpc
      port: 5007
      targetPort: 5007
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service
  labels:
    app.kubernetes.io/name: identity-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-service-pdb
  labels:
    app.kubernetes.io/name: identity-service
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
