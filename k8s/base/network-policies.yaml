---
# ---------------------------------------------------------------------------
# 16. MONITORING & OBSERVABILITY
# ----------------------------------------------------------------------------
# Allow Prometheus scraping from the monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  labels:
    app.kubernetes.io/part-of: his-hope
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: his-hope
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 5000
          protocol: TCP
        - port: 5002
          protocol: TCP
        - port: 5003
          protocol: TCP
        - port: 5004
          protocol: TCP
        - port: 5005
          protocol: TCP
        - port: 5010
          protocol: TCP
        - port: 5020
          protocol: TCP
        - port: 5030
          protocol: TCP
        # Linkerd proxy metrics port
        - port: 4190
          protocol: TCP

---
# Allow Linkerd proxy admin and tap ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd-proxy
  labels:
    app.kubernetes.io/part-of: his-hope
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: his-hope
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd-viz
      ports:
        # Linkerd proxy admin (metrics, pprof)
        - port: 4190
          protocol: TCP
        # Linkerd proxy tap
        - port: 4191
          protocol: TCP
    # Allow Linkerd control plane to check proxy health
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
      ports:
        - port: 4190
          protocol: TCP
        - port: 4191
          protocol: TCP

---
# Allow health check probes from nodes (kubelet)
# kubelet originates from the node IP, so we allow all from node CIDRs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-health-probes
  labels:
    app.kubernetes.io/part-of: his-hope
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: his-hope
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            # Allow kubelet health check probes from the cluster node CIDR
            # Adjust this CIDR to match your cluster's node network
            cidr: 0.0.0.0/0
      ports:
        - port: 5000
          protocol: TCP
        - port: 5002
          protocol: TCP
        - port: 5003
          protocol: TCP
        - port: 5004
          protocol: TCP
        - port: 5005
          protocol: TCP
        - port: 5010
          protocol: TCP
        - port: 5020
          protocol: TCP
        - port: 5030
          protocol: TCP
        - port: 80
          protocol: TCP
        # Linkerd proxy liveness/readiness
        - port: 4190
          protocol: TCP

---
# Allow Jaeger agent traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-jaeger-ingest
  labels:
    app.kubernetes.io/part-of: his-hope
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: his-hope
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd-jaeger
          podSelector:
            matchLabels:
              app.kubernetes.io/part-of: linkerd
      ports:
        # Jaeger gRPC ingestion
        - port: 14250
          protocol: TCP
        # Jaeger HTTP Thrift ingestion
        - port: 14268
          protocol: TCP
        # Jaeger agent compact thrift
        - port: 6831
          protocol: UDP
        - port: 6832
          protocol: UDP
