apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-bff
  labels:
    app.kubernetes.io/name: lab-bff
    app.kubernetes.io/component: bff
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-bff
  labels:
    app.kubernetes.io/name: lab-bff
    app.kubernetes.io/component: bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lab-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab-bff
        app.kubernetes.io/component: bff
        app: lab-bff
    spec:
      serviceAccountName: lab-bff
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lab-bff
          image: his-hope/lab-bff:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1654
            runAsGroup: 1654
          ports:
            - name: http
              containerPort: 5300
              protocol: TCP
          env:
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: lab-bff-secrets
                  key: redis-connection
            - name: Services__Lab
              value: "http://labservice:5010"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5300
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5300
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: lab-bff
  labels:
    app.kubernetes.io/name: lab-bff
    app.kubernetes.io/component: bff
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lab-bff
  ports:
    - name: http
      port: 5300
      targetPort: 5300
      protocol: TCP
