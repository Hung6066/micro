apiVersion: v1
kind: ServiceAccount
metadata:
  name: patient-service
  labels:
    app.kubernetes.io/name: patient-service
    app.kubernetes.io/component: backend
automountServiceAccountToken: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: patient-service-config
  labels:
    app.kubernetes.io/name: patient-service
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: "http://0.0.0.0:5002;https://0.0.0.0:5003"
  ConnectionStrings__PatientDb: "Host=postgres;Port=5432;Database=patientdb;Username=his_hope;Password=${POSTGRES_PASSWORD}"
  RabbitMQ__Host: rabbitmq
  Redis__Connection: redis:6379
  Consul__Address: http://consul:8500
  OpenTelemetry__JaegerEndpoint: http://jaeger:14278/api/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  labels:
    app.kubernetes.io/name: patient-service
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: patient-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: patient-service
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: patient-service
      containers:
        - name: patient-service
          image: his-hope/patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
            - name: grpc
              containerPort: 5006
              protocol: TCP
          envFrom:
            - configMapRef:
                name: patient-service-config
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  labels:
    app.kubernetes.io/name: patient-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: patient-service
  ports:
    - name: http
      port: 5002
      targetPort: 5002
      protocol: TCP
    - name: grpc
      port: 5006
      targetPort: 5006
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-service
  labels:
    app.kubernetes.io/name: patient-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: patient-service-pdb
  labels:
    app.kubernetes.io/name: patient-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: patient-service
