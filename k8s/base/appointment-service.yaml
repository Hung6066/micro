apiVersion: v1
kind: ServiceAccount
metadata:
  name: appointment-service
  labels:
    app.kubernetes.io/name: appointment-service
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: appointment-service-config
  labels:
    app.kubernetes.io/name: appointment-service
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: "http://0.0.0.0:5004;https://0.0.0.0:5005"
  ConnectionStrings__AppointmentDb: "Host=postgres;Port=5432;Database=appointmentdb;Username=his_hope;Password="
  RabbitMQ__Host: rabbitmq
  Redis__Connection: redis:6379
  Consul__Address: http://consul:8500
  OpenTelemetry__JaegerEndpoint: http://jaeger:14278/api/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  labels:
    app.kubernetes.io/name: appointment-service
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: appointment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appointment-service
        app.kubernetes.io/component: backend
        app: appointment-service
    spec:
      serviceAccountName: appointment-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: appointment-service
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1654
            runAsGroup: 1654
          image: his-hope/appointment-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5004
              protocol: TCP
            - name: grpc
              containerPort: 5008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: appointment-service-config
          env:
            - name: ConnectionStrings__AppointmentDb
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: appointment_connection_string
          resources:
            requests:
              cpu: 512m
              memory: 1Gi
            limits:
              cpu: 512m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 5004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 40
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  labels:
    app.kubernetes.io/name: appointment-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: appointment-service
  ports:
    - name: http
      port: 5004
      targetPort: 5004
      protocol: TCP
    - name: grpc
      port: 5008
      targetPort: 5008
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: appointment-service
  labels:
    app.kubernetes.io/name: appointment-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: appointment-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    - type: Object
      object:
        describedObject:
          kind: Service
          name: appointment-service
        metric:
          name: requests_per_second
        target:
          type: AverageValue
          averageValue: "500"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: appointment-service-pdb
  labels:
    app.kubernetes.io/name: appointment-service
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: appointment-service
