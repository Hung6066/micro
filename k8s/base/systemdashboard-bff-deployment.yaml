apiVersion: v1
kind: ServiceAccount
metadata:
  name: systemdashboard-bff
  labels:
    app.kubernetes.io/name: systemdashboard-bff
    app.kubernetes.io/component: dashboard
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: systemdashboard-bff
  labels:
    app.kubernetes.io/name: systemdashboard-bff
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: systemdashboard-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: systemdashboard-bff
        app.kubernetes.io/component: dashboard
        app: systemdashboard-bff
    spec:
      serviceAccountName: systemdashboard-bff
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: systemdashboard-bff
          image: his-hope/systemdashboard-bff:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1654
            runAsGroup: 1654
          ports:
            - name: http
              containerPort: 5700
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: Consul__Address
              value: "http://consul-server:8500"
            - name: Elasticsearch__Url
              value: "http://elasticsearch:9200"
            - name: Jaeger__QueryUrl
              value: "http://jaeger-query:16686"
            - name: Prometheus__Url
              value: "http://prometheus-server:9090"
            - name: Kubernetes__Enabled
              value: "true"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5700
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5700
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
