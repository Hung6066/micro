apiVersion: batch/v1
kind: CronJob
metadata:
  name: outbox-cleanup
  namespace: his-hope
  labels:
    app: outbox-cleanup
    component: data-lifecycle
spec:
  schedule: "0 3 * * *"          # Daily at 3:00 AM
  concurrencyPolicy: Forbid       # Don't start a new run if previous is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: outbox-cleanup
            component: data-lifecycle
        spec:
          serviceAccountName: outbox-cleanup
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: cockroachdb/cockroach:v24.1.2
            imagePullPolicy: IfNotPresent
            env:
            - name: COCKROACH_HOST
              value: cockroachdb-public:26257
            - name: COCKROACH_USER
              value: root
            - name: RETENTION_DAYS
              value: "30"
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              RETENTION_DAYS=${RETENTION_DAYS:-30}
              echo "=== Outbox Cleanup - $(date -u -Iseconds) ==="
              echo "Retention period: ${RETENTION_DAYS} days"

              # Databases that contain outbox messages
              DATABASES=("patientdb" "appointmentdb" "clinicaldb" "identitydb" "labdb" "billingdb" "pharmacydb")

              for db in "${DATABASES[@]}"; do
                echo ">>> Cleaning ${db}.OutboxMessages ..."
                cockroach sql \
                  --host="${COCKROACH_HOST}" \
                  --user="${COCKROACH_USER}" \
                  --insecure \
                  --database="${db}" \
                  -e "
                DELETE FROM OutboxMessages
                WHERE  Status IN ('Completed', 'Skipped')
                  AND  ProcessedOn IS NOT NULL
                  AND  ProcessedOn < now() - INTERVAL '${RETENTION_DAYS} days';
                "
                echo "<<< Done: ${db}"
              done

              echo "=== Outbox cleanup completed successfully ==="
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outbox-cleanup
  namespace: his-hope
  labels:
    app: outbox-cleanup
    component: data-lifecycle
