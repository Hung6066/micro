apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    
    processors:
      probabilistic_sampler:
        sampling_percentage: 10
      
      tail_sampling:
        decision_wait: 30s
        num_traces: 50000
        policies:
          - name: errors-policy
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: latency-policy
            type: latency
            latency:
              threshold_ms: 500
          - name: priority-policy
            type: string_attribute
            string_attribute:
              key: priority
              values: ["P0", "P1"]
      
      rate_limiting:
        spans_per_second: 500
    
    exporters:
      jaeger:
        endpoint: jaeger-collector:14250
        tls:
          insecure: true
    
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [probabilistic_sampler, tail_sampling, rate_limiting]
          exporters: [jaeger]
