# =============================================================================
# Patient Service Profile
# =============================================================================
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  namespace: his-hope
  name: patient-service.his-hope.svc.cluster.local
  labels:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/name: patient-service
spec:
  routes:
  - name: GET /health
    condition:
      method: GET
      pathRegex: /health.*
    isRetryable: true
    timeout: 3s
  - name: POST /grpc.health.v1.Health/Check
    condition:
      method: POST
      pathRegex: /grpc.health.v1.Health/Check
    isRetryable: true
    retries:
      budget:
        minRetriesPerSecond: 5
        retryRatio: 0.2
    timeout: 3s
  - name: POST /patient.PatientService/GetPatient
    condition:
      method: POST
      pathRegex: /patient\\.PatientService/GetPatient
    isRetryable: true
    retries:
      budget:
        minRetriesPerSecond: 10
        retryRatio: 0.2
    timeout: 5s
  - name: POST /patient.PatientService/CreatePatient
    condition:
      method: POST
      pathRegex: /patient\\.PatientService/CreatePatient
    isRetryable: false
    timeout: 10s
  - name: POST /patient.PatientService/UpdatePatient
    condition:
      method: POST
      pathRegex: /patient\\.PatientService/UpdatePatient
    isRetryable: false
    timeout: 10s
  - name: POST /patient.PatientService/SearchPatients
    condition:
      method: POST
      pathRegex: /patient\\.PatientService/SearchPatients
    isRetryable: true
    retries:
      budget:
        minRetriesPerSecond: 5
        retryRatio: 0.2
    timeout: 15s
  - name: POST /patient.PatientService/ValidatePatientExists
    condition:
      method: POST
      pathRegex: /patient\\.PatientService/ValidatePatientExists
    isRetryable: true
    retries:
      budget:
        minRetriesPerSecond: 10
        retryRatio: 0.2
    timeout: 3s
  - name: GET /api/patients/{id}
    condition:
      method: GET
      pathRegex: /api/patients/[^/]+
    isRetryable: true
    retries:
      budget:
        minRetriesPerSecond: 10
        retryRatio: 0.2
    timeout: 5s
  - name: POST /api/patients
    condition:
      method: POST
      pathRegex: /api/patients
    isRetryable: false
    timeout: 10s
  - name: PUT /api/patients/{id}
    condition:
      method: PUT
      pathRegex: /api/patients/[^/]+
    isRetryable: false
    timeout: 10s
  - name: GET /api/patients/search
    condition:
      method: GET
      pathRegex: /api/patients/search.*
    isRetryable: true
    retries:
      budget:
        minRetriesPerSecond: 5
        retryRatio: 0.2
    timeout: 15s
---
