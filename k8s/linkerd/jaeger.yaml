apiVersion: jaeger.linkerd.io/v1alpha1
kind: LinkerdJaeger
metadata:
  name: linkerd-jaeger
  namespace: linkerd-jaeger
  labels:
    app.kubernetes.io/part-of: linkerd
    linkerd.io/extension: jaeger
spec:
  collector:
    resources:
      cpu:
        limit: 200m
        request: 100m
      memory:
        limit: 256Mi
        request: 128Mi
  jaeger:
    resources:
      cpu:
        limit: 500m
        request: 200m
      memory:
        limit: 1Gi
        request: 512Mi
