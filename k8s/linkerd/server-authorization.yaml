# =============================================================================
# Patient Service Authorizations
# =============================================================================
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  namespace: his-hope
  name: patient-service-grpc
  labels:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/name: patient-service
spec:
  server:
    name: patient-service-grpc
  client:
    meshTLS:
      unauthenticated: false
      identities:
        - identity-service.his-hope.serviceaccount.identity.cluster.local
        - appointment-service.his-hope.serviceaccount.identity.cluster.local
        - clinical-service.his-hope.serviceaccount.identity.cluster.local
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  namespace: his-hope
  name: patient-service-http
  labels:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/name: patient-service
spec:
  server:
    name: patient-service-http
  client:
    meshTLS:
      unauthenticated: false
      identities:
        - identity-service.his-hope.serviceaccount.identity.cluster.local
        - appointment-service.his-hope.serviceaccount.identity.cluster.local
        - clinical-service.his-hope.serviceaccount.identity.cluster.local
    unauthenticated:
      - networks:
        - cidr: 0.0.0.0/0
---
