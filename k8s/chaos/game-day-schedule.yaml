apiVersion: v1
kind: ConfigMap
metadata:
  namespace: chaos-engineering
  name: game-day-schedule
  labels:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/component: game-day
  annotations:
    description: "Defines Game Day schedules for Chaos Engineering experiments on His.Hope EMR"
    maintainer: "his-hope-sre@hishop.com"
data:
  schedule.yaml: |
    gameDays:
    - name: "weekly-chaos-wednesday"
      description: "Weekly mid-week chaos to test routine resilience"
      schedule: "0 10 * * 3"    # Every Wednesday at 10 AM
      timezone: "UTC"
      experiments:
        - pod-kill-every-6h
        - network-delay-50ms
        - cpu-stress-80pct
      duration: 30m             # All experiments run for 30 minutes
      blastRadius: "namespace=his-hope"
      notify:
        slack: "#his-hope-sre"
        email: "sre@hishop.com"
      rollbackPlan: "auto"      # Experiments have their own automatic rollback via duration

    - name: "monthly-full-chaos"
      description: "Full chaos engineering exercise on the 1st of each month"
      schedule: "0 2 1 * *"    # 1st day of every month at 2 AM
      timezone: "UTC"
      experiments:
        - bulk-pod-kill-game-day
        - network-delay-heavy-game-day
        - network-loss-25pct
        - cpu-stress-80pct
        - memory-stress-80pct
        - http-500-errors
        - grpc-unavailable
        - dns-error
        - disk-delay
      duration: 60m
      blastRadius: "namespace=his-hope"
      notify:
        slack: "#his-hope-sre"
        email: "sre@hishop.com"
        pagerduty: "his-hope-chaos"
      rollbackPlan: "immediate"
      rollbackScript: "kubectl apply -f /etc/chaos/rollback/rollback-script.yaml"
      successCriteria:
        - "All critical services recover within 5 minutes"
        - "No data loss in PostgreSQL"
        - "Patient appointments not lost"
        - "Billing transactions eventually consistent within 10 minutes"

    - name: "quarterly-disaster-recovery"
      description: "Quarterly full DR exercise"
      schedule: "0 2 1 */3 *"  # 1st day of every 3rd month at 2 AM
      timezone: "UTC"
      experiments:
        - bulk-pod-kill-game-day
        - network-delay-heavy-game-day
        - network-loss-25pct
        - cpu-stress-80pct
        - memory-stress-80pct
        - http-500-errors
        - grpc-unavailable
        - dns-error
        - disk-delay
        - disk-fault
        - partition-clinical-from-db
        - partition-identity-from-redis
      duration: 120m
      blastRadius: "namespace=his-hope"
      notify:
        slack: "#his-hope-sre"
        email: "sre@hishop.com"
        pagerduty: "his-hope-chaos"
      rollbackPlan: "immediate"
      successCriteria:
        - "All services recover automatically within 10 minutes"
        - "RPO: Zero data loss confirmed"
        - "RTO: All services operational within 15 minutes"
