apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  namespace: his-hope
  name: partition-clinical-from-db
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: network-partition
    chaos-mesh/schedule: routine
  annotations:
    description: "Partitions clinical-service from PostgreSQL every 12 hours to test database connection failure handling and degraded-mode operation"
    maintainer: "his-hope-sre@hishop.com"
    game-day-scope: "monthly-full-chaos"
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app: clinical-service
  direction: both
  target:
    mode: all
    selector:
      namespaces:
        - his-hope
      labelSelectors:
        app.kubernetes.io/name: postgres
  duration: 30s
  scheduler:
    cron: "@every 12h"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  namespace: his-hope
  name: partition-identity-from-redis
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: network-partition
    chaos-mesh/schedule: routine
  annotations:
    description: "Partitions identity-service from Redis every 12 hours to test session cache miss handling and fallback to database"
    maintainer: "his-hope-sre@hishop.com"
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app: identity-service
  direction: both
  target:
    mode: all
    selector:
      namespaces:
        - his-hope
      labelSelectors:
        app.kubernetes.io/name: redis
  duration: 30s
  scheduler:
    cron: "@every 12h"
