apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  namespace: his-hope
  name: pod-kill-every-6h
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: pod-kill
    chaos-mesh/schedule: routine
  annotations:
    description: "Kills a single random pod in the his-hope namespace every 6 hours to test resilience and self-healing"
    maintainer: "his-hope-sre@hishop.com"
    game-day-scope: "weekly-chaos-wednesday"
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app.kubernetes.io/part-of: his-hope
    fieldSelectors:
      - metadata.name!=patient-service-0    # Don't kill stateful pod patient-service-0
      - metadata.name!=clinical-service-0   # Don't kill stateful pod clinical-service-0
      - metadata.name!=redis-0               # Don't kill stateful Redis
      - metadata.name!=postgres-0            # Don't kill stateful PostgreSQL
      - metadata.name!=rabbitmq-0            # Don't kill stateful RabbitMQ
  duration: 30s
  scheduler:
    cron: "@every 6h"
  gracePeriod: 30
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  namespace: his-hope
  name: bulk-pod-kill-game-day
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: pod-kill
    chaos-mesh/schedule: game-day
  annotations:
    description: "Game Day experiment: kills 30% of pods simultaneously to test bulk recovery and system degradation behavior"
    maintainer: "his-hope-sre@hishop.com"
    game-day-scope: "monthly-full-chaos"
    recovery-plan: "kubernetes will reschedule killed pods; monitor recovery time"
spec:
  action: pod-kill
  mode: fixed-percent
  value: "30"
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app.kubernetes.io/part-of: his-hope
    fieldSelectors:
      - metadata.name!=patient-service-0
      - metadata.name!=clinical-service-0
      - metadata.name!=redis-0
      - metadata.name!=postgres-0
      - metadata.name!=rabbitmq-0
  duration: 60s
  scheduler:
    cron: "0 3 * * 0"    # Every Sunday at 3 AM
  gracePeriod: 15
