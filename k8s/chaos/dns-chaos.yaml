apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  namespace: his-hope
  name: dns-error
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: dns-fault
    chaos-mesh/schedule: routine
  annotations:
    description: "Returns DNS errors for *.hishop.com and postgres.* patterns targeting identity-service every 12h to test DNS caching and fallback"
    maintainer: "his-hope-sre@hishop.com"
    game-day-scope: "monthly-full-chaos"
spec:
  action: error
  mode: all
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app: identity-service
  patterns:
    - "*.hishop.com"
    - "postgres.*"
    - "redis.*"
    - "rabbitmq.*"
  duration: 2m
  scheduler:
    cron: "@every 12h"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  namespace: his-hope
  name: dns-random
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: dns-fault
    chaos-mesh/schedule: routine
  annotations:
    description: "Returns random IP addresses for external service lookups to test external dependency resolution"
    maintainer: "his-hope-sre@hishop.com"
spec:
  action: random
  mode: all
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app: api-gateway
  patterns:
    - "*.hishop.com"
    - "*.external-service.com"
  duration: 2m
  scheduler:
    cron: "@every 24h"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  namespace: his-hope
  name: kill-coredns-recovery-test
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: pod-kill
    chaos-mesh/schedule: test
  annotations:
    description: "Kills a CoreDNS pod every 24 hours to test DNS resolution recovery after DNS fault injection. Validates that gRPC name resolution and service discovery survive CoreDNS pod restarts."
    maintainer: "his-hope-sre@hishop.com"
    game-day-scope: "monthly-full-chaos"
    recovery-plan: "CoreDNS runs as a Deployment; verify DNS resolution resumes within 5s of pod restart and no gRPC connections permanently fail"
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - kube-system
    labelSelectors:
      k8s-app: kube-dns
  duration: 30s
  scheduler:
    cron: "@every 24h"
