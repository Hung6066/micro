apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  namespace: his-hope
  name: disk-delay
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: io-fault
    chaos-mesh/schedule: routine
  annotations:
    description: "Injects 100ms I/O latency on PostgreSQL's data directory every 24 hours to test database query timeout handling"
    maintainer: "his-hope-sre@hishop.com"
    game-day-scope: "monthly-full-chaos"
spec:
  action: latency
  mode: one
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app.kubernetes.io/name: postgres
  volumePath: /var/lib/postgresql/data
  path: "/var/lib/postgresql/data/**/*"
  delay: 100ms
  duration: 2m
  scheduler:
    cron: "@every 24h"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  namespace: his-hope
  name: disk-fault
  labels:
    app.kubernetes.io/part-of: his-hope
    chaos-mesh/experiment-type: io-fault
    chaos-mesh/schedule: routine
  annotations:
    description: "Injects I/O faults (errno 5 / EIO) on random Redis persistence files every 48h to test data integrity and error recovery"
    maintainer: "his-hope-sre@hishop.com"
spec:
  action: fault
  mode: one
  selector:
    namespaces:
      - his-hope
    labelSelectors:
      app.kubernetes.io/name: redis
  volumePath: /data
  path: "/data/dump.rdb"
  percent: 10
  errno: 5
  duration: 1m
  scheduler:
    cron: "@every 48h"
