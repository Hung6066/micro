apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-harness
  namespace: hishope
  labels:
    app.kubernetes.io/name: agent-harness
    app.kubernetes.io/component: platform
    app.kubernetes.io/part-of: his-hope
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-harness
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
