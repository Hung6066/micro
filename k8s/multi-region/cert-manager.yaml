---
# cert-manager Configuration - His.Hope EMR
# TLS certificate management with Let's Encrypt and Vault PKI
# Linkerd identity certificates can be integrated with cert-manager for CA bootstrapping

# ------------------------------------------------------------------
# Let's Encrypt ClusterIssuer for public TLS
# ------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: his-hope
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/component: cluster-issuer
spec:
  acme:
    email: ops@hishop.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudDNS:
            project: his-hope-prod
            hostedZoneName: hishop-com-zone
        selector:
          dnsZones:
            - "hishop.com"
      - http01:
          ingress:
            class: nginx
        selector: {}

---
# Staging ClusterIssuer for testing
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: his-hope
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/component: cluster-issuer
spec:
  acme:
    email: ops@hishop.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudDNS:
            project: his-hope-prod
            hostedZoneName: hishop-com-zone
        selector:
          dnsZones:
            - "hishop.com"

# ------------------------------------------------------------------
# Vault PKI ClusterIssuer for internal mTLS
# ------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
  namespace: his-hope
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/component: cluster-issuer
spec:
  vault:
    path: pki_int/sign/internal-service
    server: https://vault-active.his-hope.svc.cluster.local:8200
    caBundle: ""
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: cert-manager
        secretRef:
          name: cert-manager-vault-token
          key: token

# ------------------------------------------------------------------
# Wildcard Certificate for *.hishop.com
# ------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: his-hope-tls
  namespace: linkerd
  labels:
    app.kubernetes.io/name: his-hope
    app.kubernetes.io/component: tls
spec:
  secretName: his-hope-tls
  secretTemplate:
    labels:
      app.kubernetes.io/name: his-hope
      app.kubernetes.io/component: tls
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "his-hope"
  duration: 2160h
  renewBefore: 360h
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
    - "*.hishop.com"
    - "hishop.com"
    - "*.his-hope.svc.cluster.local"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

