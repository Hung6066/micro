# =============================================================================
# Prophet Predictive Auto-Scaler — CronJob
# =============================================================================
# Runs every hour, loads trained Prophet models for all backend services,
# predicts the next 60 minutes of request traffic, and patches HPA
# minReplicas so capacity is pre-warmed before demand arrives.
#
# Training is a separate process (train_model.py) — triggered manually or
# via a scheduled Job.
# =============================================================================

---
# ── ServiceAccount ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: predictive-scaler
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/managed-by: kustomize

---
# ── Role: patch HPAs ──────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: predictive-scaler
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
rules:
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

---
# ── RoleBinding ────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: predictive-scaler
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: predictive-scaler
subjects:
  - kind: ServiceAccount
    name: predictive-scaler
    namespace: his-hope

---
# ── PersistentVolumeClaim (model storage) ──────────────────────────────────
# Stores trained Prophet models so they survive CronJob pod restarts and are
# shared between the training Job and the prediction CronJob.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: predictive-scaler-models
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ── ConfigMap: configuration ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: predictive-scaler-config
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
data:
  config.yaml: |
    # =============================================================================
    # Prophet Predictive Auto-Scaler — Configuration
    # =============================================================================
    prometheus_url: "http://prometheus-k8s.monitoring.svc.cluster.local:9090"
    model_dir: "/models"

    services:
      - name: api-gateway
        target_rps_per_pod: 1000
        min_replicas_lower_bound: 2
        max_replicas_upper_bound: 10
      - name: patient-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 3
        max_replicas_upper_bound: 30
      - name: appointment-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 3
        max_replicas_upper_bound: 20
      - name: clinical-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 2
        max_replicas_upper_bound: 15
      - name: identity-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 2
        max_replicas_upper_bound: 10
      - name: lab-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 2
        max_replicas_upper_bound: 15
      - name: billing-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 2
        max_replicas_upper_bound: 10
      - name: pharmacy-service
        target_rps_per_pod: 500
        min_replicas_lower_bound: 2
        max_replicas_upper_bound: 10

    training:
      history_days: 14
      data_interval_minutes: 5
      seasonality_mode: additive
      changepoint_prior_scale: 0.05
      seasonality_prior_scale: 10.0
      daily_seasonality: true
      weekly_seasonality: true
      yearly_seasonality: false
      uncertainty_samples: 1000

    prediction:
      forecast_steps: 12
      interval_width: 0.80
      retrain_if_model_older_hours: 24

---
# ── ConfigMap: Python scripts ──────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: predictive-scaler-scripts
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
data:
  predict.py: |
    #!/usr/bin/env python3
    """
    Prophet Prediction — Predictive Auto-Scaler
    =============================================
    Loads trained Prophet models, forecasts request rate for the next 60
    minutes, calculates recommended HPA minReplicas per service, and patches
    the corresponding HorizontalPodAutoscaler resources via the Kubernetes API.

    Intended to be run as a Kubernetes CronJob (hourly).

    Usage:
        python predict.py                           # uses config.yaml in same dir

    Requires:  pip install prophet joblib pyyaml requests kubernetes
    """

    from __future__ import annotations

    import argparse
    import json
    import logging
    import math
    import os
    import sys
    from datetime import datetime, timezone
    from pathlib import Path
    from typing import Any

    import yaml

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s [%(levelname)s] %(name)s: %(message)s",
        datefmt="%Y-%m-%dT%H:%M:%S%z",
    )
    logger = logging.getLogger("predict")


    def load_config(path: str | Path) -> dict[str, Any]:
        with open(path, "r") as f:
            cfg = yaml.safe_load(f)
        cfg["prometheus_url"] = os.environ.get(
            "PROMETHEUS_URL",
            cfg.get("prometheus_url", "http://prometheus-k8s.monitoring.svc.cluster.local:9090"),
        )
        return cfg


    def load_model(service_name: str, model_dir: str | Path) -> Any | None:
        import joblib
        path = Path(model_dir) / f"{service_name}_prophet_model.pkl"
        if not path.exists():
            logger.warning("Model file not found for %s: %s", service_name, path)
            return None
        try:
            payload = joblib.load(path)
            model = payload["model"] if isinstance(payload, dict) else payload
            logger.info("Loaded model for %s from %s", service_name, path)
            return model
        except Exception:
            logger.exception("Failed to load model for %s", service_name)
            return None


    def predict_peak(
        model: Any,
        service_name: str,
        forecast_steps: int = 12,
        interval_width: float = 0.80,
    ) -> dict[str, Any]:
        future = model.make_future_dataframe(
            periods=forecast_steps,
            freq="5min",
            include_history=False,
        )
        forecast = model.predict(future)
        yhat = forecast["yhat"].values
        upper_col = "yhat_upper"
        if upper_col not in forecast.columns:
            upper_col = [c for c in forecast.columns if c.startswith("yhat_upper")][0]
        yhat_upper = forecast[upper_col].values
        predicted_peak = float(max(yhat_upper))
        predicted_mean = float(yhat.mean())
        return {
            "predicted_peak_rps": round(predicted_peak, 2),
            "predicted_mean_rps": round(predicted_mean, 2),
            "forecast_timestamps": [t.isoformat() for t in forecast["ds"]],
            "yhat_values": [round(float(v), 2) for v in yhat],
            "yhat_upper_values": [round(float(v), 2) for v in yhat_upper],
            "forecast_generated_at": datetime.now(timezone.utc).isoformat(),
        }


    def calculate_min_replicas(
        predicted_peak_rps: float,
        target_rps_per_pod: float,
        lower_bound: int,
        upper_bound: int,
    ) -> int:
        if math.isnan(predicted_peak_rps) or predicted_peak_rps < 0:
            logger.warning("Invalid predicted peak (%.2f), falling back to lower bound %d",
                           predicted_peak_rps, lower_bound)
            return lower_bound
        if target_rps_per_pod <= 0:
            logger.error("target_rps_per_pod must be > 0, got %f", target_rps_per_pod)
            return lower_bound
        recommended = math.ceil(predicted_peak_rps / target_rps_per_pod)
        clamped = max(lower_bound, min(recommended, upper_bound))
        logger.info(
            "  peak=%.2f rps -> target=%d rps/pod -> recommended=%d -> clamped=[%d..%d] -> %d",
            predicted_peak_rps, int(target_rps_per_pod), recommended,
            lower_bound, upper_bound, clamped,
        )
        return clamped


    def patch_hpa_min_replicas(
        service_name: str,
        min_replicas: int,
        namespace: str = "his-hope",
        dry_run: bool = False,
    ) -> bool:
        if dry_run:
            logger.info("  [DRY-RUN] Would patch HPA %s -> minReplicas=%d", service_name, min_replicas)
            return True
        try:
            from kubernetes import client, config
        except ImportError:
            logger.error("The 'kubernetes' package is not installed. Run: pip install kubernetes")
            return False
        try:
            config.load_incluster_config()
        except config.ConfigException:
            try:
                config.load_kube_config()
            except config.ConfigException as exc:
                logger.error("Failed to load Kubernetes config: %s", exc)
                return False
        api = client.AutoscalingV2Api()
        patch_body = {"spec": {"minReplicas": min_replicas}}
        try:
            api.patch_namespaced_horizontal_pod_autoscaler(
                name=service_name, namespace=namespace, body=patch_body,
            )
            logger.info("  Patched HPA %s -> minReplicas=%d", service_name, min_replicas)
            return True
        except client.exceptions.ApiException as exc:
            if exc.status == 404:
                logger.warning("  HPA not found for %s in namespace %s", service_name, namespace)
            else:
                logger.error("  Failed to patch HPA %s: %s", service_name, exc)
            return False
        except Exception:
            logger.exception("  Unexpected error patching HPA %s", service_name)
            return False


    def predict_for_service(
        service_cfg: dict[str, Any],
        config: dict[str, Any],
        dry_run: bool = False,
    ) -> dict[str, Any] | None:
        svc_name = service_cfg["name"]
        model_dir = config.get("model_dir", "/models")
        pred_cfg = config.get("prediction", {})
        forecast_steps = pred_cfg.get("forecast_steps", 12)
        interval_width = pred_cfg.get("interval_width", 0.80)
        logger.info("=== Predicting %s ===", svc_name)
        model = load_model(svc_name, model_dir)
        if model is None:
            logger.warning("  Skipping %s: no model available", svc_name)
            return None
        try:
            forecast = predict_peak(model, svc_name, forecast_steps=forecast_steps, interval_width=interval_width)
        except Exception:
            logger.exception("  Prediction failed for %s", svc_name)
            return None
        min_replicas = calculate_min_replicas(
            predicted_peak_rps=forecast["predicted_peak_rps"],
            target_rps_per_pod=service_cfg["target_rps_per_pod"],
            lower_bound=service_cfg["min_replicas_lower_bound"],
            upper_bound=service_cfg["max_replicas_upper_bound"],
        )
        patched = patch_hpa_min_replicas(svc_name, min_replicas, dry_run=dry_run)
        result = {
            "service": svc_name,
            "predicted_peak_rps": forecast["predicted_peak_rps"],
            "predicted_mean_rps": forecast["predicted_mean_rps"],
            "target_rps_per_pod": service_cfg["target_rps_per_pod"],
            "recommended_min_replicas": min_replicas,
            "lower_bound": service_cfg["min_replicas_lower_bound"],
            "upper_bound": service_cfg["max_replicas_upper_bound"],
            "hpa_patched": patched,
            "forecast_generated_at": forecast["forecast_generated_at"],
        }
        logger.info(
            "  %s -> minReplicas=%d (peak=%.1f rps, target=%d rps/pod, patched=%s)",
            svc_name, min_replicas, forecast["predicted_peak_rps"],
            service_cfg["target_rps_per_pod"], patched,
        )
        return result


    def main() -> None:
        parser = argparse.ArgumentParser(description="Predict request rate and patch HPA minReplicas")
        parser.add_argument("--config", default=os.path.join(os.path.dirname(__file__), "config.yaml"),
                            help="Path to configuration YAML (default: ./config.yaml)")
        parser.add_argument("--service", default=None, help="Predict for a single service only (default: all)")
        parser.add_argument("--dry-run", action="store_true", help="Log predictions but do not patch HPAs")
        parser.add_argument("--namespace", default="his-hope",
                            help="Kubernetes namespace for HPA resources (default: his-hope)")
        args = parser.parse_args()
        config = load_config(args.config)
        services = config.get("services", [])
        if args.service:
            services = [s for s in services if s["name"] == args.service]
            if not services:
                logger.error("Service '%s' not found in config", args.service)
                sys.exit(1)
        logger.info("Prophet predictive scaler run - %d service(s), dry_run=%s", len(services), args.dry_run)
        results = []
        for svc in services:
            result = predict_for_service(svc, config, dry_run=args.dry_run)
            if result:
                results.append(result)
        summary = {
            "run_timestamp": datetime.now(timezone.utc).isoformat(),
            "dry_run": args.dry_run,
            "services_processed": len(results),
            "services": results,
        }
        print(json.dumps(summary, indent=2))
        logger.info("Prediction run complete: %d services processed", len(results))

    if __name__ == "__main__":
        main()

---
# ── CronJob ────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: predictive-scaler
  namespace: his-hope
  labels:
    app.kubernetes.io/name: predictive-scaler
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: his-hope
spec:
  schedule: "0 * * * *"                    # Every hour at the top of the hour
  concurrencyPolicy: Forbid                # Never overlap runs
  startingDeadlineSeconds: 120             # Give up if pod can't start in 2 min
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0                      # Don't retry — next cycle will catch up
      template:
        metadata:
          labels:
            app.kubernetes.io/name: predictive-scaler
            app.kubernetes.io/component: autoscaling
          annotations:
            linkerd.io/inject: disabled    # No mTLS needed for K8s API calls
        spec:
          serviceAccountName: predictive-scaler
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: predictive-scaler-models
            - name: scripts
              configMap:
                name: predictive-scaler-scripts
                defaultMode: 0755          # Executable scripts
            - name: config
              configMap:
                name: predictive-scaler-config
                defaultMode: 0644
          containers:
            - name: scaler
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: PROMETHEUS_URL
                  value: "http://prometheus-k8s.monitoring.svc.cluster.local:9090"
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
                - name: PYTHONUNBUFFERED
                  value: "1"
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # ── Install runtime dependencies ────────────────────
                  pip install --quiet --no-cache-dir \
                    prophet==1.1.6 \
                    joblib==1.4.2 \
                    pyyaml==6.0.2 \
                    requests==2.32.3 \
                    pandas==2.2.3 \
                    kubernetes==31.0.0 \
                    2>&1 | tail -5

                  echo "=== Predictive Scaler Run - $(date -u -Iseconds) ==="

                  # ── Execute prediction ──────────────────────────────
                  python /scripts/predict.py \
                    --config /config/config.yaml \
                    --namespace his-hope

                  echo "=== Scaler run complete ==="
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              volumeMounts:
                - name: models
                  mountPath: /models
                - name: scripts
                  mountPath: /scripts/predict.py
                  subPath: predict.py
                  readOnly: true
                - name: config
                  mountPath: /config/config.yaml
                  subPath: config.yaml
                  readOnly: true
