# =============================================================================
# Secret Rotation CronJobs
# Automated 90-day rotation of database passwords, JWT signing keys, and
# RabbitMQ credentials using HashiCorp Vault.
#
# Each CronJob:
#   1. Authenticates to Vault via Kubernetes auth (service account token)
#   2. Rotates the credential in the source system (DB / Transit / RabbitMQ)
#   3. Updates the corresponding K8s Secret
#   4. Triggers a rolling restart of affected workloads
# =============================================================================

---
# ---------------------------------------------------------------------------
# ServiceAccount: vault-rotator
# Used by all three rotation CronJobs to authenticate to Vault (via K8s
# auth method) and to interact with the Kubernetes API (rollout restart,
# patch secrets).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-rotator
  namespace: his-hope
  labels:
    app.kubernetes.io/name: vault-rotator
    app.kubernetes.io/component: secret-rotation
    app.kubernetes.io/part-of: his-hope

---
# ---------------------------------------------------------------------------
# ClusterRole: vault-rotator
# Permissions needed to manage secrets and trigger rollouts.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-rotator
  labels:
    app.kubernetes.io/name: vault-rotator
    app.kubernetes.io/component: secret-rotation
    app.kubernetes.io/part-of: his-hope
rules:
  # Read and patch Secrets (postgres-secret, rabbitmq-secret, redis-secret)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Trigger rolling restarts on Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - patient-service
      - identity-service
      - appointment-service
      - clinical-service
      - lab-service
      - billing-service
      - pharmacy-service
      - api-gateway
      - frontend
    verbs: ["get", "list", "watch", "patch"]
  # TokenReview for Vault Kubernetes auth
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  # ServiceAccount token creation for Vault auth
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
# ---------------------------------------------------------------------------
# ClusterRoleBinding: vault-rotator-binding
# Bind the vault-rotator ClusterRole to the vault-rotator ServiceAccount.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-rotator-binding
  labels:
    app.kubernetes.io/name: vault-rotator
    app.kubernetes.io/component: secret-rotation
    app.kubernetes.io/part-of: his-hope
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-rotator
subjects:
  - kind: ServiceAccount
    name: vault-rotator
    namespace: his-hope

---
# ---------------------------------------------------------------------------
# CronJob: rotate-db-passwords
# Schedule: 1st day of every 3rd month at 02:00 UTC
# Rotates all CockroachDB user passwords via Vault database secrets engine,
# updates the postgres-secret K8s Secret, and triggers a rolling restart of
# all backend services.
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rotate-db-passwords
  namespace: his-hope
  labels:
    app.kubernetes.io/name: rotate-db-passwords
    app.kubernetes.io/component: secret-rotation
    app.kubernetes.io/part-of: his-hope
spec:
  schedule: "0 2 1 */3 *"          # Every 90 days (1st day of every 3rd month)
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rotate-db-passwords
            app.kubernetes.io/component: secret-rotation
            app.kubernetes.io/part-of: his-hope
        spec:
          serviceAccountName: vault-rotator
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: rotate
              image: hashicorp/vault:1.16
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: VAULT_ADDR
                  value: "https://vault-active.his-hope.svc.cluster.local:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "true"
                - name: VAULT_K8S_MOUNT
                  value: "kubernetes"
                - name: VAULT_ROLE
                  value: "vault-rotator"
                - name: K8S_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: SECRET_NAME
                  value: "postgres-secret"
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  # ------------------------------------------------------------------
                  # Helper: call the Kubernetes API via the in-cluster service account
                  # ------------------------------------------------------------------
                  KUBE_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                  KUBE_CA="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  KUBE_API="https://kubernetes.default.svc"
                  NS="${K8S_NAMESPACE}"

                  k8s_patch_secret() {
                    local name="$1" patch="$2"
                    curl -s --cacert "${KUBE_CA}" \
                      -H "Authorization: Bearer ${KUBE_TOKEN}" \
                      -H "Content-Type: application/strategic-merge-patch+json" \
                      -X PATCH \
                      -d "${patch}" \
                      "${KUBE_API}/api/v1/namespaces/${NS}/secrets/${name}"
                  }

                  k8s_rollout_restart() {
                    local deploy="$1"
                    curl -s --cacert "${KUBE_CA}" \
                      -H "Authorization: Bearer ${KUBE_TOKEN}" \
                      -H "Content-Type: application/strategic-merge-patch+json" \
                      -X PATCH \
                      -d '{"spec":{"template":{"metadata":{"annotations":{"kubectl.kubernetes.io/restartedAt":"'"$(date -u -Iseconds)"'"}}}}}' \
                      "${KUBE_API}/apis/apps/v1/namespaces/${NS}/deployments/${deploy}"
                  }

                  echo "=== DB Password Rotation - $(date -u -Iseconds) ==="

                  # Authenticate to Vault via Kubernetes auth
                  vault login -method=kubernetes \
                    -namespace=his-hope \
                    -path="${VAULT_K8S_MOUNT}" \
                    role="${VAULT_ROLE}" \
                    token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"

                  # ------------------------------------------------------------------
                  # Database user definitions
                  # Each entry: <Vault-static-role> <DB-username> <K8s-Secret-key>
                  # ------------------------------------------------------------------
                  DB_USERS=(
                    "patient:patient_service:patient_connection_string"
                    "identity:identity_service:identity_connection_string"
                    "appointment:appointment_service:appointment_connection_string"
                    "clinical:clinical_service:clinical_connection_string"
                    "lab:lab_service:lab_connection_string"
                    "billing:billing_service:billing_connection_string"
                    "pharmacy:pharmacy_service:pharmacy_connection_string"
                  )

                  # Build the secret patch data
                  SECRET_PATCH='{"data":{}}'

                  for entry in "${DB_USERS[@]}"; do
                    IFS=':' read -r role user secret_key <<< "${entry}"

                    echo ">>> Rotating password for ${user} ..."

                    # Rotate the password via Vault database static role rotation
                    # This uses Vault's database secrets engine to rotate the password
                    # in CockroachDB and returns the new credentials
                    if vault read "database/static-roles/${role}" &>/dev/null; then
                      vault write -f "database/static-roles/${role}/rotate"
                    else
                      # Fallback: generate password via policy and store in Vault KV
                      NEW_PW=$(vault write -field=password \
                        "sys/policies/password/database/generate" length=32)
                      vault kv put "secret/postgres/${user}" password="${NEW_PW}"
                    fi

                    # Read the updated credentials from Vault KV
                    PW=$(vault kv get -field=password "secret/postgres/${user}")

                    # Build the connection string
                    CONN_STR="Host=localhost;Port=6432;Database=${user%_service}db;Username=${user};Password=${PW}"

                    # Base64-encode for the K8s Secret patch
                    ENCODED=$(echo -n "${CONN_STR}" | base64 -w0)
                    SECRET_PATCH=$(echo "${SECRET_PATCH}" | jq \
                      --arg key "${secret_key}" \
                      --arg val "${ENCODED}" \
                      '.data[$key] = $val')

                    echo "<<< ${user} password rotated."
                  done

                  # Update the K8s Secret with new connection strings
                  echo ">>> Updating K8s Secret ${SECRET_NAME} ..."
                  k8s_patch_secret "${SECRET_NAME}" "${SECRET_PATCH}"
                  echo "<<< Secret updated."

                  # Trigger rolling restart of all backend services
                  echo ">>> Rolling restart backend services ..."
                  DEPLOYMENTS=(
                    patient-service identity-service appointment-service
                    clinical-service lab-service billing-service pharmacy-service
                  )
                  for deploy in "${DEPLOYMENTS[@]}"; do
                    echo "    Restarting ${deploy} ..."
                    k8s_rollout_restart "${deploy}"
                  done

                  echo "=== DB Password Rotation completed successfully ==="

---
# ---------------------------------------------------------------------------
# CronJob: rotate-jwt-keys
# Schedule: 1st day of every 3rd month at 03:00 UTC
# Rotates the JWT signing key in Vault's transit engine and triggers a
# rolling restart of identity-service so it picks up the new key.
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rotate-jwt-keys
  namespace: his-hope
  labels:
    app.kubernetes.io/name: rotate-jwt-keys
    app.kubernetes.io/component: secret-rotation
    app.kubernetes.io/part-of: his-hope
spec:
  schedule: "0 3 1 */3 *"          # Every 90 days at 03:00 UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rotate-jwt-keys
            app.kubernetes.io/component: secret-rotation
            app.kubernetes.io/part-of: his-hope
        spec:
          serviceAccountName: vault-rotator
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: rotate
              image: hashicorp/vault:1.16
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: VAULT_ADDR
                  value: "https://vault-active.his-hope.svc.cluster.local:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "true"
                - name: VAULT_K8S_MOUNT
                  value: "kubernetes"
                - name: VAULT_ROLE
                  value: "vault-rotator"
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  # ------------------------------------------------------------------
                  # Helper: call the Kubernetes API via the in-cluster service account
                  # ------------------------------------------------------------------
                  KUBE_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                  KUBE_CA="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  KUBE_API="https://kubernetes.default.svc"

                  k8s_rollout_restart() {
                    local deploy="$1" ns="$2"
                    curl -s --cacert "${KUBE_CA}" \
                      -H "Authorization: Bearer ${KUBE_TOKEN}" \
                      -H "Content-Type: application/strategic-merge-patch+json" \
                      -X PATCH \
                      -d '{"spec":{"template":{"metadata":{"annotations":{"kubectl.kubernetes.io/restartedAt":"'"$(date -u -Iseconds)"'"}}}}}' \
                      "${KUBE_API}/apis/apps/v1/namespaces/${ns}/deployments/${deploy}"
                  }

                  echo "=== JWT Key Rotation - $(date -u -Iseconds) ==="

                  # Authenticate to Vault via Kubernetes auth
                  vault login -method=kubernetes \
                    -namespace=his-hope \
                    -path="${VAULT_K8S_MOUNT}" \
                    role="${VAULT_ROLE}" \
                    token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"

                  # Rotate the JWT signing key in the transit engine
                  # This creates a new key version while keeping old versions for
                  # token validation during the transition period
                  echo ">>> Rotating transit key: transit/keys/jwt-signing ..."
                  vault write -f transit/keys/jwt-signing/rotate
                  echo "<<< Transit key rotated."

                  # Retrieve and log the new key version for audit
                  KEY_INFO=$(vault read transit/keys/jwt-signing)
                  echo "New key version: $(echo "${KEY_INFO}" | grep 'latest_version' | awk '{print $2}')"

                  # Trigger rolling restart of identity-service so it picks up
                  # the new signing key from Vault
                  echo ">>> Rolling restart identity-service ..."
                  k8s_rollout_restart "identity-service" "his-hope"
                  echo "<<< identity-service restart triggered."

                  echo "=== JWT Key Rotation completed successfully ==="

---
# ---------------------------------------------------------------------------
# CronJob: rotate-rabbitmq-credentials
# Schedule: 1st day of every 3rd month at 04:00 UTC
# Generates a new RabbitMQ password via Vault, updates the user in RabbitMQ
# via the management HTTP API, updates the rabbitmq-secret K8s Secret, and
# triggers a rolling restart of all services that connect to RabbitMQ.
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rotate-rabbitmq-credentials
  namespace: his-hope
  labels:
    app.kubernetes.io/name: rotate-rabbitmq-credentials
    app.kubernetes.io/component: secret-rotation
    app.kubernetes.io/part-of: his-hope
spec:
  schedule: "0 4 1 */3 *"          # Every 90 days at 04:00 UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rotate-rabbitmq-credentials
            app.kubernetes.io/component: secret-rotation
            app.kubernetes.io/part-of: his-hope
        spec:
          serviceAccountName: vault-rotator
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: rotate
              image: hashicorp/vault:1.16
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: VAULT_ADDR
                  value: "https://vault-active.his-hope.svc.cluster.local:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "true"
                - name: VAULT_K8S_MOUNT
                  value: "kubernetes"
                - name: VAULT_ROLE
                  value: "vault-rotator"
                - name: K8S_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: RABBITMQ_SERVICE
                  value: "rabbitmq.his-hope.svc.cluster.local"
                - name: RABBITMQ_MGMT_PORT
                  value: "15672"
                - name: RABBITMQ_USER
                  value: "his_hope"
                - name: SECRET_NAME
                  value: "rabbitmq-secret"
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  # ------------------------------------------------------------------
                  # Helper: call the Kubernetes API via the in-cluster service account
                  # ------------------------------------------------------------------
                  KUBE_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                  KUBE_CA="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  KUBE_API="https://kubernetes.default.svc"
                  NS="${K8S_NAMESPACE}"

                  k8s_patch_secret() {
                    local name="$1" patch="$2"
                    curl -s --cacert "${KUBE_CA}" \
                      -H "Authorization: Bearer ${KUBE_TOKEN}" \
                      -H "Content-Type: application/strategic-merge-patch+json" \
                      -X PATCH \
                      -d "${patch}" \
                      "${KUBE_API}/api/v1/namespaces/${NS}/secrets/${name}"
                  }

                  k8s_rollout_restart() {
                    local deploy="$1"
                    curl -s --cacert "${KUBE_CA}" \
                      -H "Authorization: Bearer ${KUBE_TOKEN}" \
                      -H "Content-Type: application/strategic-merge-patch+json" \
                      -X PATCH \
                      -d '{"spec":{"template":{"metadata":{"annotations":{"kubectl.kubernetes.io/restartedAt":"'"$(date -u -Iseconds)"'"}}}}}' \
                      "${KUBE_API}/apis/apps/v1/namespaces/${NS}/deployments/${deploy}"
                  }

                  echo "=== RabbitMQ Credential Rotation - $(date -u -Iseconds) ==="

                  # Authenticate to Vault via Kubernetes auth
                  vault login -method=kubernetes \
                    -namespace=his-hope \
                    -path="${VAULT_K8S_MOUNT}" \
                    role="${VAULT_ROLE}" \
                    token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"

                  # Read the current RabbitMQ password from the K8s Secret
                  # (needed to authenticate to the RabbitMQ management API)
                  echo ">>> Reading current RabbitMQ password from K8s Secret ..."
                  CURRENT_PW_B64=$(curl -s --cacert "${KUBE_CA}" \
                    -H "Authorization: Bearer ${KUBE_TOKEN}" \
                    "${KUBE_API}/api/v1/namespaces/${NS}/secrets/${SECRET_NAME}" | \
                    jq -r '.data.password')
                  CURRENT_PW=$(echo "${CURRENT_PW_B64}" | base64 -d)

                  # Generate a new password via Vault password policy
                  echo ">>> Generating new password via Vault ..."
                  NEW_PW=$(vault write -field=password \
                    "sys/policies/password/rabbitmq/generate" length=32)
                  echo "<<< New password generated."

                  # Update the password in RabbitMQ via the Management HTTP API
                  echo ">>> Updating RabbitMQ user password ..."
                  RABBITMQ_URL="http://${RABBITMQ_USER}:${CURRENT_PW}@${RABBITMQ_SERVICE}:${RABBITMQ_MGMT_PORT}"
                  curl -s -u "${RABBITMQ_USER}:${CURRENT_PW}" \
                    -X PUT \
                    "${RABBITMQ_URL}/api/users/${RABBITMQ_USER}" \
                    -H "Content-Type: application/json" \
                    -d "$(cat <<EOF
                  {
                    "password": "${NEW_PW}",
                    "tags": "administrator"
                  }
                  EOF
                  )"
                  echo "<<< RabbitMQ password updated."

                  # Store the new password in Vault KV for audit/backup
                  vault kv put "secret/rabbitmq/credentials" \
                    password="${NEW_PW}" \
                    rotated_at="$(date -u -Iseconds)"

                  # Update the K8s Secret with the new password
                  echo ">>> Updating K8s Secret ${SECRET_NAME} ..."
                  NEW_PW_B64=$(echo -n "${NEW_PW}" | base64 -w0)
                  k8s_patch_secret "${SECRET_NAME}" \
                    '{"data":{"password":"'"${NEW_PW_B64}"'"}}'
                  echo "<<< Secret updated."

                  # Trigger rolling restart of all services so they pick up
                  # the new credentials from the updated secret
                  echo ">>> Rolling restart all services ..."
                  ALL_DEPLOYS=(
                    patient-service identity-service appointment-service
                    clinical-service lab-service billing-service pharmacy-service
                    api-gateway frontend
                  )
                  for deploy in "${ALL_DEPLOYS[@]}"; do
                    echo "    Restarting ${deploy} ..."
                    k8s_rollout_restart "${deploy}"
                  done

                  echo "=== RabbitMQ Credential Rotation completed successfully ==="
