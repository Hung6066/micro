# =============================================================================
# Unleash Feature Flag Service
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: unleash-secret
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: feature-flags
type: Opaque
stringData:
  # PostgreSQL connection string for Unleash state storage
  # Format: postgres://user:password@host:port/database
  DATABASE_URL: "postgres://his_hope:placeholder@cockroachdb-public.his-hope.svc.cluster.local:26257/unleashdb?sslmode=disable"
  # Comma-separated initial admin API tokens for client authentication
  # Format: *:*.<environment>.<project-hash>
  INIT_ADMIN_API_TOKENS: "*:*.development.unleash-internal"
---
apiVersion: v1
kind: Service
metadata:
  name: unleash
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: feature-flags
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: unleash
  ports:
    - name: http-api
      port: 4242
      targetPort: 4242
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: feature-flags
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: unleash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unleash
        app.kubernetes.io/component: feature-flags
        app: unleash
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unleash
          image: unleashorg/unleash-server:6.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - name: http-api
              containerPort: 4242
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: unleash-secret
                  key: DATABASE_URL
            - name: DATABASE_SSL
              value: "rejectUnauthorized"
            - name: INIT_ADMIN_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: unleash-secret
                  key: INIT_ADMIN_API_TOKENS
            - name: LOG_LEVEL
              value: "warn"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
