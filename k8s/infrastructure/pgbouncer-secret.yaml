# =============================================================================
# PgBouncer Authentication
# Contains the userlist.txt file with database user credentials.
# 
# IMPORTANT: Replace the placeholder password below with the actual
# MD5-hashed password for the his_hope database user.
# 
# Generate the MD5 hash with:
#   echo -n "md5$(echo -n '<password><username>' | md5sum | cut -d' ' -f1)"
#
# For CockroachDB, use SCRAM-SHA-256 equivalent or trust auth for sidecar.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-secret
  labels:
    app.kubernetes.io/name: pgbouncer-sidecar
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: his-hope
type: Opaque
data:
  # userlist.txt: pg_hba.conf-style user authentication file
  # Format: "username" "password_or_md5_hash"
  # The password here must match the CockroachDB/PostgreSQL user password
  # 
  # PLACEHOLDER - Replace with actual base64-encoded userlist.txt content
  # Example (base64 of: "his_hope" "md5abc123..."):
  userlist.txt: IiJoaXNfaG9wZSIgInBsYWNlaG9sZGVyX3Bhc3N3b3JkIgo=
