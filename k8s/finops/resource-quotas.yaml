apiVersion: v1
kind: ResourceQuota
metadata:
  name: his-hope-quota
  namespace: his-hope
spec:
  hard:
    requests.cpu: "40"
    requests.memory: "80Gi"
    limits.cpu: "80"
    limits.memory: "160Gi"
    persistentvolumeclaims: "30"
    pods: "100"
    services: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: his-hope-limits
  namespace: his-hope
spec:
  limits:
  - max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "200m"
      memory: "512Mi"
    type: Container
