# =============================================================================
# RemediationPolicy CRD
# Defines automated remediation actions triggered by Alertmanager alerts
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: remediationpolicies.his-hope.io
  annotations:
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/managed-by: kustomize
  labels:
    app.kubernetes.io/name: remediation-operator
    app.kubernetes.io/part-of: his-hope
    app.kubernetes.io/component: operator
spec:
  group: his-hope.io
  names:
    plural: remediationpolicies
    singular: remediationpolicy
    shortNames:
      - rpol
      - rpols
    kind: RemediationPolicy
    listKind: RemediationPolicyList
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
              properties:
                name:
                  type: string
                namespace:
                  type: string
            spec:
              type: object
              required:
                - alertName
                - severity
                - actions
              properties:
                # The Alertmanager alert name to match (e.g. "ServiceDown", "HighMemoryUsage")
                alertName:
                  type: string
                  minLength: 1
                  description: >
                    The Alertmanager alert name to match. The operator will
                    reconcile this policy when an alert webhook arrives with
                    alertname matching this value.
                # Severity filter — only trigger if alert severity >= this threshold
                severity:
                  type: string
                  enum:
                    - P0
                    - P1
                    - P2
                    - P3
                  description: >
                    Minimum severity threshold. The operator will only execute
                    this policy if the alert's severity is equal to or higher
                    than this value (P0 > P1 > P2 > P3).
                # Cooldown prevents re-execution within the window (default 5m)
                cooldown:
                  type: string
                  default: "5m"
                  pattern: '^[0-9]+[smh]$'
                  description: >
                    Duration to wait before re-executing this policy for the
                    same alert name in the same namespace. Accepts seconds (s),
                    minutes (m), or hours (h). Default: 5m.
                # Maximum number of concurrent actions
                maxConcurrency:
                  type: integer
                  default: 1
                  minimum: 1
                  maximum: 10
                  description: >
                    Maximum number of concurrent remediation actions this
                    policy may execute. Default: 1.
                # Remediation actions to execute in order
                actions:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: object
                    required:
                      - type
                      - target
                    properties:
                      # Action type determines what remediation to perform
                      type:
                        type: string
                        enum:
                          - scale
                          - restart
                          - rollback
                          - notify
                        description: >
                          Type of remediation action:
                          - scale: Adjust replica count or resource limits
                          - restart: Force-roll a Deployment/Rollout restart
                          - rollback: Revert to a previous Deployment revision
                          - notify: Send a notification (Slack, PagerDuty, etc.)
                      # Target resource identifier
                      target:
                        type: string
                        minLength: 1
                        description: >
                          Target resource for the action. Format depends on type:
                          - scale: "deployment/<name>" or "statefulset/<name>"
                          - restart: "deployment/<name>"
                          - rollback: "deployment/<name>"
                          - notify: channel/webhook identifier
                      # Action-specific parameters
                      params:
                        type: object
                        properties:
                          # Scale action: number of replicas
                          replicas:
                            type: integer
                            minimum: 0
                            maximum: 100
                            description: >
                              Target replica count (scale action only).
                          # Scale action: CPU/memory resource adjustments
                          cpuRequest:
                            type: string
                            pattern: '^[0-9]+m?$'
                            description: >
                              CPU request to set (e.g. "500m", "2").
                          memoryRequest:
                            type: string
                            pattern: '^[0-9]+(Mi|Gi|Ki)?$'
                            description: >
                              Memory request to set (e.g. "512Mi", "2Gi").
                          cpuLimit:
                            type: string
                            pattern: '^[0-9]+m?$'
                            description: >
                              CPU limit to set (e.g. "1000m", "4").
                          memoryLimit:
                            type: string
                            pattern: '^[0-9]+(Mi|Gi|Ki)?$'
                            description: >
                              Memory limit to set (e.g. "1Gi", "4Gi").
                          # Rollback action: revision to revert to
                          revision:
                            type: integer
                            minimum: 1
                            description: >
                              Target revision number (rollback action only).
                          # Notify action: message template
                          message:
                            type: string
                            maxLength: 2000
                            description: >
                              Notification message content template
                              (notify action only).
                          channel:
                            type: string
                            description: >
                              Notification channel (notify action only).
                          # Restart action: max unavailable during rollout
                          maxUnavailable:
                            type: string
                            default: "25%"
                            pattern: '^[0-9]+%?$'
                            description: >
                              Max unavailable pods during restart as
                              integer or percentage (restart action only).
                        # No additional params beyond those defined
                        additionalProperties: false
            status:
              type: object
              properties:
                # Current state of the policy
                phase:
                  type: string
                  enum:
                    - Active
                    - Cooldown
                    - Disabled
                  default: Active
                # Timestamp of the last execution
                lastExecutionTime:
                  type: string
                  format: date-time
                  nullable: true
                # Reference to the last RemediationAction
                lastActionRef:
                  type: string
                  nullable: true
                # Count of total executions
                executionCount:
                  type: integer
                  default: 0
                # Count of successful actions
                successCount:
                  type: integer
                  default: 0
                # Count of failed actions
                failureCount:
                  type: integer
                  default: 0
                # Current conditions
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                        enum:
                          - Ready
                          - Executing
                          - Throttled
                          - Error
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Severity
          type: string
          jsonPath: .spec.severity
        - name: Alert
          type: string
          jsonPath: .spec.alertName
        - name: Actions
          type: integer
          jsonPath: .spec.actions[*].type
          description: Number of remediation actions defined
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Executions
          type: integer
          jsonPath: .status.executionCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
