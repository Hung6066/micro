apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: his-hope-bff
  namespace: monitoring
  labels:
    app.kubernetes.io/name: his-hope-bff
    app.kubernetes.io/component: service-monitor
    app.kubernetes.io/part-of: his-hope
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: bff
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    any: true
