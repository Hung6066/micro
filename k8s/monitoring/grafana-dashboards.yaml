apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: grafana-dashboard-slo
  labels:
    grafana_dashboard: "1"
data:
  slo-dashboard.json: |
    {
      "title": "His.Hope SLO Dashboard",
      "version": 1,
      "time": { "from": "now-30d", "to": "now" },
      "panels": [
        {
          "title": "Availability SLO (30d rolling)",
          "type": "stat",
          "targets": [{
            "expr": "job:slo_availability_30d:ratio * 100",
            "legendFormat": "Availability"
          }],
          "thresholds": [
            { "value": 99.9, "color": "red" },
            { "value": 99.95, "color": "yellow" },
            { "value": 99.99, "color": "green" }
          ]
        },
        {
          "title": "Error Budget Remaining",
          "type": "gauge",
          "targets": [{
            "expr": "job:slo_error_budget_remaining_30d:ratio * 100",
            "legendFormat": "Budget Remaining"
          }],
          "thresholds": [
            { "value": 0, "color": "red" },
            { "value": 50, "color": "yellow" },
            { "value": 80, "color": "green" }
          ]
        },
        {
          "title": "Burn Rate (1h window)",
          "type": "graph",
          "targets": [{
            "expr": "job:slo_burn_rate_1h:ratio",
            "legendFormat": "Burn Rate"
          }],
          "thresholds": [
            { "value": 1, "color": "yellow" },
            { "value": 2, "color": "red" }
          ]
        },
        {
          "title": "Latency p99 by Service",
          "type": "graph",
          "targets": [
            { "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))", "legendFormat": "{{service}}" }
          ]
        },
        {
          "title": "Request Rate by Service",
          "type": "graph",
          "targets": [
            { "expr": "sum(rate(http_requests_total[5m])) by (service)", "legendFormat": "{{service}}" }
          ]
        },
        {
          "title": "Error Rate by Service",
          "type": "graph",
          "targets": [
            { "expr": "sum(rate(http_requests_total{code!~\"2..\"}[5m])) by (service)", "legendFormat": "{{service}}" }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: grafana-dashboard-services
  labels:
    grafana_dashboard: "1"
data:
  service-dashboard.json: |
    {
      "title": "His.Hope Service Overview",
      "version": 1,
      "panels": [
        {
          "title": "Up / Down",
          "type": "stat",
          "targets": [{
            "expr": "count(up{job=~\".+-service\"} == 1)",
            "legendFormat": "Healthy"
          }, {
            "expr": "count(up{job=~\".+-service\"} == 0)",
            "legendFormat": "Unhealthy"
          }]
        },
        {
          "title": "Memory Usage by Service",
          "type": "graph",
          "targets": [{ "expr": "sum(container_memory_usage_bytes{container!=\"POD\",namespace=\"his-hope\"}) by (pod)", "legendFormat": "{{pod}}" }]
        },
        {
          "title": "CPU Usage by Service",
          "type": "graph",
          "targets": [{ "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",namespace=\"his-hope\"}[5m])) by (pod)", "legendFormat": "{{pod}}" }]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: grafana-dashboard-error-tracking
  labels:
    grafana_dashboard: "1"
data:
  error-tracking-dashboard.json: |
    {
      "title": "Error Tracking & Tracing",
      "version": 1,
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Error Rate by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "none", "decimals": 2 },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "Top 5 Error Types",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "topk(5, sum(rate(http_requests_total{status!~\"2..\"}[5m])) by (status))",
              "legendFormat": "{{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "none" },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "Request Latency p50 / p95 / p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "decimals": 3 },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "Active Alerts",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "ALERTS{alertstate=\"firing\"}",
              "legendFormat": "{{alertname}} - {{service}}",
              "format": "table"
            }
          ]
        },
        {
          "id": 5,
          "title": "Failed gRPC Calls by Method",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(grpc_server_handled_total{grpc_code!=\"OK\"}[5m])) by (grpc_method)",
              "legendFormat": "{{grpc_method}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "rps", "decimals": 2 },
            "overrides": []
          }
        },
        {
          "id": 6,
          "title": "DLQ Message Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages{queue=~\".*deadletter.*\"})",
              "legendFormat": "DLQ Messages"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "title": "Errors vs Latency Correlation",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 16 },
          "targets": [
            {
              "expr": "rate(http_requests_total{status=~\"5..\"}[5m])",
              "legendFormat": "Errors - {{service}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))",
              "legendFormat": "p99 - {{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "none" },
            "overrides": []
          }
        }
      ]
    }
