apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  namespace: monitoring
  name: his-hope-slo-rules
spec:
  groups:
  - name: his-hope.slo.recording_rules
    interval: 30s
    rules:
    - record: job:slo_availability_30d:ratio
      expr: |
        sum by (service) (rate(http_requests_total{code=~"2.."}[30d]))
        /
        sum by (service) (rate(http_requests_total[30d]))
    - record: job:slo_availability_7d:ratio
      expr: |
        sum by (service) (rate(http_requests_total{code=~"2.."}[7d]))
        /
        sum by (service) (rate(http_requests_total[7d]))
    - record: job:slo_availability_1h:ratio
      expr: |
        sum by (service) (rate(http_requests_total{code=~"2.."}[1h]))
        /
        sum by (service) (rate(http_requests_total[1h]))
    - record: job:slo_latency_p99_30d:ratio
      expr: |
        sum by (service) (rate(http_request_duration_seconds_bucket{le="0.5"}[30d]))
        /
        sum by (service) (rate(http_request_duration_seconds_count[30d]))
    - record: job:slo_latency_p99_7d:ratio
      expr: |
        sum by (service) (rate(http_request_duration_seconds_bucket{le="0.5"}[7d]))
        /
        sum by (service) (rate(http_request_duration_seconds_count[7d]))
    - record: job:slo_latency_p99_1h:ratio
      expr: |
        sum by (service) (rate(http_request_duration_seconds_bucket{le="0.5"}[1h]))
        /
        sum by (service) (rate(http_request_duration_seconds_count[1h]))
    - record: job:slo_error_budget_30d:ratio
      expr: |
        1 - job:slo_availability_30d:ratio
    - record: job:slo_error_budget_remaining_30d:ratio
      expr: |
        0.001 - job:slo_error_budget_30d:ratio
    - record: job:slo_burn_rate_1h:ratio
      expr: |
        (1 - job:slo_availability_1h:ratio)
        /
        0.001

    # ===== Per-service SLO rules =====
    # lab-service (99.9% SLO target)
    - record: lab_service:slo_availability_30d:ratio
      expr: |
        sum by (service) (rate(http_requests_total{service="lab-service",code=~"2.."}[30d]))
        /
        sum by (service) (rate(http_requests_total{service="lab-service"}[30d]))
    - record: lab_service:slo_error_budget_30d:ratio
      expr: |
        1 - lab_service:slo_availability_30d:ratio
    - record: lab_service:slo_error_budget_remaining_30d:ratio
      expr: |
        0.001 - lab_service:slo_error_budget_30d:ratio

    # billing-service (99.99% SLO target — financial)
    - record: billing_service:slo_availability_30d:ratio
      expr: |
        sum by (service) (rate(http_requests_total{service="billing-service",code=~"2.."}[30d]))
        /
        sum by (service) (rate(http_requests_total{service="billing-service"}[30d]))
    - record: billing_service:slo_error_budget_30d:ratio
      expr: |
        1 - billing_service:slo_availability_30d:ratio
    - record: billing_service:slo_error_budget_remaining_30d:ratio
      expr: |
        0.0001 - billing_service:slo_error_budget_30d:ratio

    # pharmacy-service (99.9% SLO target)
    - record: pharmacy_service:slo_availability_30d:ratio
      expr: |
        sum by (service) (rate(http_requests_total{service="pharmacy-service",code=~"2.."}[30d]))
        /
        sum by (service) (rate(http_requests_total{service="pharmacy-service"}[30d]))
    - record: pharmacy_service:slo_error_budget_30d:ratio
      expr: |
        1 - pharmacy_service:slo_availability_30d:ratio
    - record: pharmacy_service:slo_error_budget_remaining_30d:ratio
      expr: |
        0.001 - pharmacy_service:slo_error_budget_30d:ratio

  - name: his-hope.slo.per-service-completion
    interval: 30s
    rules:
      # ---------- patient-service SLO (99.9% availability, p99 < 500ms) ----------
      - record: slo:availability:patient_service:ratio_30d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="patientservice",http_response_status_code!~"5.."}[30d]))
          / sum(rate(http_server_request_duration_seconds_count{job="patientservice"}[30d]))
      - record: slo:availability:patient_service:ratio_7d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="patientservice",http_response_status_code!~"5.."}[7d]))
          / sum(rate(http_server_request_duration_seconds_count{job="patientservice"}[7d]))
      - record: slo:availability:patient_service:ratio_1h
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="patientservice",http_response_status_code!~"5.."}[1h]))
          / sum(rate(http_server_request_duration_seconds_count{job="patientservice"}[1h]))
      - record: slo:latency_p99:patient_service:ratio_30d
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket{job="patientservice"}[30d])) by (le))
          / 0.5
      - record: slo:error_budget_remaining:patient_service
        expr: (1 - (1 - slo:availability:patient_service:ratio_30d) / (1 - 0.999)) * 100
      - record: slo:burn_rate_1h:patient_service
        expr: |
          (1 - slo:availability:patient_service:ratio_1h)
          / (1 - 0.999)
      - record: slo:burn_rate_6h:patient_service
        expr: |
          (1 - slo:availability:patient_service:ratio_7d)
          / (1 - 0.999)

      # ---------- identity-service SLO (99.95% availability, p99 < 300ms) ----------
      - record: slo:availability:identity_service:ratio_30d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="identityservice",http_response_status_code!~"5.."}[30d]))
          / sum(rate(http_server_request_duration_seconds_count{job="identityservice"}[30d]))
      - record: slo:availability:identity_service:ratio_7d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="identityservice",http_response_status_code!~"5.."}[7d]))
          / sum(rate(http_server_request_duration_seconds_count{job="identityservice"}[7d]))
      - record: slo:availability:identity_service:ratio_1h
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="identityservice",http_response_status_code!~"5.."}[1h]))
          / sum(rate(http_server_request_duration_seconds_count{job="identityservice"}[1h]))
      - record: slo:latency_p99:identity_service:ratio_30d
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket{job="identityservice"}[30d])) by (le))
          / 0.3
      - record: slo:error_budget_remaining:identity_service
        expr: (1 - (1 - slo:availability:identity_service:ratio_30d) / (1 - 0.9995)) * 100
      - record: slo:burn_rate_1h:identity_service
        expr: |
          (1 - slo:availability:identity_service:ratio_1h)
          / (1 - 0.9995)
      - record: slo:burn_rate_6h:identity_service
        expr: |
          (1 - slo:availability:identity_service:ratio_7d)
          / (1 - 0.9995)

      # ---------- appointment-service SLO (99.9% availability, p99 < 1s) ----------
      - record: slo:availability:appointment_service:ratio_30d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="appointmentservice",http_response_status_code!~"5.."}[30d]))
          / sum(rate(http_server_request_duration_seconds_count{job="appointmentservice"}[30d]))
      - record: slo:availability:appointment_service:ratio_7d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="appointmentservice",http_response_status_code!~"5.."}[7d]))
          / sum(rate(http_server_request_duration_seconds_count{job="appointmentservice"}[7d]))
      - record: slo:availability:appointment_service:ratio_1h
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="appointmentservice",http_response_status_code!~"5.."}[1h]))
          / sum(rate(http_server_request_duration_seconds_count{job="appointmentservice"}[1h]))
      - record: slo:latency_p99:appointment_service:ratio_30d
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket{job="appointmentservice"}[30d])) by (le))
          / 1.0
      - record: slo:error_budget_remaining:appointment_service
        expr: (1 - (1 - slo:availability:appointment_service:ratio_30d) / (1 - 0.999)) * 100
      - record: slo:burn_rate_1h:appointment_service
        expr: |
          (1 - slo:availability:appointment_service:ratio_1h)
          / (1 - 0.999)
      - record: slo:burn_rate_6h:appointment_service
        expr: |
          (1 - slo:availability:appointment_service:ratio_7d)
          / (1 - 0.999)

      # ---------- clinical-service SLO (99.99% availability, p99 < 500ms) ----------
      - record: slo:availability:clinical_service:ratio_30d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="clinicalservice",http_response_status_code!~"5.."}[30d]))
          / sum(rate(http_server_request_duration_seconds_count{job="clinicalservice"}[30d]))
      - record: slo:availability:clinical_service:ratio_7d
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="clinicalservice",http_response_status_code!~"5.."}[7d]))
          / sum(rate(http_server_request_duration_seconds_count{job="clinicalservice"}[7d]))
      - record: slo:availability:clinical_service:ratio_1h
        expr: |
          sum(rate(http_server_request_duration_seconds_count{
            job="clinicalservice",http_response_status_code!~"5.."}[1h]))
          / sum(rate(http_server_request_duration_seconds_count{job="clinicalservice"}[1h]))
      - record: slo:latency_p99:clinical_service:ratio_30d
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket{job="clinicalservice"}[30d])) by (le))
          / 0.5
      - record: slo:error_budget_remaining:clinical_service
        expr: (1 - (1 - slo:availability:clinical_service:ratio_30d) / (1 - 0.9999)) * 100
      - record: slo:burn_rate_1h:clinical_service
        expr: |
          (1 - slo:availability:clinical_service:ratio_1h)
          / (1 - 0.9999)
      - record: slo:burn_rate_6h:clinical_service
        expr: |
          (1 - slo:availability:clinical_service:ratio_7d)
          / (1 - 0.9999)

  - name: his-hope.slo.alerts
    interval: 30s
    rules:
    - alert: SLOErrorBudgetBurnCritical
      expr: |
        (
          (1 - (sum by (service) (rate(http_requests_total{code=~"2.."}[1h])) / sum by (service) (rate(http_requests_total[1h]))))
          /
          0.001
        ) > 2
        and on (service)
        (
          (1 - (sum by (service) (rate(http_requests_total{code=~"2.."}[5m])) / sum by (service) (rate(http_requests_total[5m]))))
          /
          0.001
        ) > 2
      for: 5m
      labels:
        severity: critical
        team: sre
      annotations:
        summary: "High error budget burn rate for {{ $labels.service }} (critical)"
        description: "Error budget for {{ $labels.service }} is being consumed at >2x rate. Remaining: {{ $value | humanizePercentage }}"

    - alert: SLOErrorBudgetBurnWarning
      expr: |
        (
          (1 - (sum by (service) (rate(http_requests_total{code=~"2.."}[6h])) / sum by (service) (rate(http_requests_total[6h]))))
          /
          0.001
        ) > 1
      for: 15m
      labels:
        severity: warning
        team: sre
      annotations:
        summary: "Error budget burn rate elevated for {{ $labels.service }} (warning)"
        description: "Error budget for {{ $labels.service }} being consumed at >1x rate over 6h"

    - alert: HighLatencyP99
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
        ) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High p99 latency for {{ $labels.service }}"
        description: "p99 latency of {{ $value }}s exceeds 500ms threshold"

    - alert: ServiceDown
      expr: |
        absent(up{job=~".+-service"}) == 1
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "Service {{ $labels.job }} is down"

    - alert: HighGrpcErrorRate
      expr: |
        sum by (service) (rate(grpc_server_handled_total{grpc_code!="OK"}[5m]))
        /
        sum by (service) (rate(grpc_server_handled_total[5m]))
        > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High gRPC error rate for {{ $labels.service }} ({{ $value | humanizePercentage }})"

    - alert: CircuitBreakerOpen
      expr: |
        circuit_breaker_state{state="open"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Circuit breaker {{ $labels.name }} is OPEN"
        description: "Circuit breaker for {{ $labels.service }} has tripped"

    - alert: OutboxBacklogGrowing
      expr: |
        rate(outbox_messages_total{status="pending"}[15m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Outbox messages are accumulating"
        description: "Pending outbox messages growing at {{ $value }}/s"

    - alert: RabbitMQQueueDepth
      expr: |
        rabbitmq_queue_messages_ready > 1000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "RabbitMQ queue {{ $labels.queue }} depth > 1000"

    - alert: SLOErrorBudgetBurnCritical_Patient
      expr: slo:burn_rate_1h:patient_service > 14.4 and slo:burn_rate_6h:patient_service > 14.4
      for: 2m
      labels:
        severity: critical
        service: patient-service
      annotations:
        summary: "Patient service error budget burn rate critical"

    - alert: SLOErrorBudgetBurnCritical_Identity
      expr: slo:burn_rate_1h:identity_service > 14.4 and slo:burn_rate_6h:identity_service > 14.4
      for: 2m
      labels:
        severity: critical
        service: identity-service
      annotations:
        summary: "Identity service error budget burn rate critical"

    - alert: SLOErrorBudgetBurnCritical_Appointment
      expr: slo:burn_rate_1h:appointment_service > 14.4 and slo:burn_rate_6h:appointment_service > 14.4
      for: 2m
      labels:
        severity: critical
        service: appointment-service
      annotations:
        summary: "Appointment service error budget burn rate critical"

    - alert: SLOErrorBudgetBurnCritical_Clinical
      expr: slo:burn_rate_1h:clinical_service > 14.4 and slo:burn_rate_6h:clinical_service > 14.4
      for: 2m
      labels:
        severity: critical
        service: clinical-service
      annotations:
        summary: "Clinical service error budget burn rate critical"

  - name: business-errors
    interval: 30s
    rules:
    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 2m
      labels:
        severity: critical
        category: business-error
      annotations:
        summary: "Service {{ $labels.service }} has error rate > 5%"
        runbook_url: "https://wiki.his-hope.com/runbooks/high-error-rate"

    - alert: ApiLatencyHigh
      expr: histogram_quantile(0.99, rate(http_request_duration_ms_bucket[5m])) > 2000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "p99 latency > 2s for {{ $labels.service }}"

    - alert: ServiceDown
      expr: up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Service {{ $labels.job }} is DOWN"

    - alert: DeadLetterQueueGrowth
      expr: rabbitmq_queue_messages{queue=~".*deadletter.*"} > 100
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "DLQ growing: {{ $value }} messages in {{ $labels.queue }}"

    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.container }} memory > 90%"
