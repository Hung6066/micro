apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: '${SLACK_WEBHOOK_URL}'
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    route:
      receiver: 'sre-team'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      group_by: ['severity', 'service']
      routes:
      - match:
          severity: critical
        receiver: 'sre-team-critical'
        repeat_interval: 15m
        continue: true
      - match:
          severity: critical
        receiver: 'slack-critical'
        continue: true
      - match:
          severity: critical
        receiver: 'email-oncall'
      - match:
          severity: warning
        receiver: 'sre-team'
      - match:
          alertname: 'ServiceDown'
        receiver: 'sre-team-critical'

    receivers:
    - name: 'sre-team'
      slack_configs:
      - channel: '#his-hope-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true

    - name: 'sre-team-critical'
      pagerduty_configs:
      - routing_key: 'xxxxx'
        severity: critical
        description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'
      slack_configs:
      - channel: '#his-hope-critical'
        title: '🚨 {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true

    - name: 'slack-critical'
      slack_configs:
      - api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX'  # CONFIGURE: per-environment Slack webhook
        channel: '#his-hope-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Alert:* {{ .CommonAnnotations.summary }}
          *Runbook:* {{ .CommonAnnotations.runbook_url }}
        send_resolved: true

    - name: 'email-oncall'
      email_configs:
      - to: 'oncall@his-hope.com'  # CONFIGURE: per-environment email
        from: 'alertmanager@his-hope.com'
        smarthost: 'smtp.his-hope.com:587'  # CONFIGURE: per-environment SMTP
        html: '{{ template "email.default.html" . }}'
        send_resolved: true

    inhibit_rules:
    - source_match:
        severity: critical
      target_match:
        severity: warning
      equal: ['service', 'alertname']
