apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - prometheus-rules.yaml
  - prometheus-config.yaml
  - grafana-dashboards.yaml
  - alertmanager-config.yaml
  - slo-exporter-config.yaml
  - incident-response.yaml
  - jaeger.yaml
  - elasticsearch.yaml
  - elasticsearch-secrets.yaml
  - kibana.yaml
  - servicemonitors.yaml
  - blackbox-exporter-config.yaml
  - anomaly-rules.yaml
  - bff-pod-monitor.yaml
  - bff-grafana-dashboard.yaml
  - bff-slo-alerts.yaml

commonLabels:
  app.kubernetes.io/part-of: his-hope
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: prometheus-config
    behavior: replace
    files:
      - prometheus.yml
  - name: alertmanager-config
    behavior: replace
    files:
      - alertmanager.yml
  - name: slo-exporter-config
    behavior: replace
    files:
      - slo.yaml
  - name: incident-response
    behavior: replace
    files:
      - runbook-service-down.md
      - runbook-high-latency.md
      - runbook-data-inconsistency.md
      - postmortem-template.md

patches:
  - target:
      kind: PrometheusRule
      name: his-hope-slo-rules
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          app.kubernetes.io/name: prometheus-rules
          app.kubernetes.io/component: slo
  - target:
      kind: PrometheusRule
      name: his-hope-anomaly-rules
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          app.kubernetes.io/name: prometheus-rules
          app.kubernetes.io/component: anomaly
