  type: team
  profile:
    displayName: Platform Engineering
    email: platform-team@hishop.com
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: admin
  namespace: his-hope
spec:
  profile:
    displayName: Admin User
    email: admin@hishop.com
