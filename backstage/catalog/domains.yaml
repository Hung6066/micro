  name: healthcare
  description: Healthcare domain - patient management, clinical encounters, scheduling
spec:
  owner: team-clinical
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: his-hope-emr
  description: His.Hope Enterprise EMR System
  tags:
    - healthcare
    - emr
    - hipaa
spec:
  domain: healthcare
  owner: team-clinical
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: team-clinical
  description: Clinical Engineering Team
