app:
  title: His.Hope Developer Portal
  baseUrl: https://developer.hishop.com

organization:
  name: His.Hope
  namespace: his-hope

backend:
  baseUrl: https://developer.hishop.com
  listen:
    port: 7007
  database:
    client: pg
    connection:
      host: postgres
      port: 5432
      user: backstage
      password: ${BACKSTAGE_DB_PASSWORD}
  cors:
    origin: https://developer.hishop.com
    methods: [GET, POST, PUT, DELETE]
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    default-src: ["'self'"]
  reading:
    allow:
      - host: raw.githubusercontent.com
      - host: github.com
      - host: gitlab.com

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
    - host: gitlab.com
      token: ${GITLAB_TOKEN}

auth:
  environment: production
  providers:
    google:
      development:
        clientId: ${AUTH_GOOGLE_CLIENT_ID}
        clientSecret: ${AUTH_GOOGLE_CLIENT_SECRET}
    oauth2:
      development:
        clientId: ${AUTH_OAUTH2_CLIENT_ID}
        clientSecret: ${AUTH_OAUTH2_CLIENT_SECRET}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Group, User, Template, Location]
  locations:
    - type: url
      target: https://github.com/hishop/his-hope/blob/main/backstage/catalog/all.yaml
    - type: url
      target: https://github.com/hishop/his-hope/blob/main/backstage/catalog/software.yaml
    - type: url
      target: https://github.com/hishop/his-hope/blob/main/backstage/catalog/domains.yaml

scaffolder:
  rules:
    - allow: [Template]
  tasks:
    timeout: 1h

techdocs:
  builder: 'local'
  generators:
    techdocs: 'docker'
  publisher:
    type: 'local'

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - name: his-hope-us-east1
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: false
          dashboardUrl: https://console.cloud.google.com/kubernetes/clusters/us-east1/his-hope
        - name: his-hope-europe-west1
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          dashboardUrl: https://console.cloud.google.com/kubernetes/clusters/europe-west1/his-hope
        - name: his-hope-asia-east1
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          dashboardUrl: https://console.cloud.google.com/kubernetes/clusters/asia-east1/his-hope

argocd:
  username: ${ARGOCD_USERNAME}
  password: ${ARGOCD_PASSWORD}
  baseUrl: https://argocd.hishop.com
  appLocatorMethods:
    - type: config
      instances:
        - name: argocd
          url: https://argocd.hishop.com

jenkins:
  baseUrl: https://jenkins.hishop.com
  username: ${JENKINS_USERNAME}
  apiKey: ${JENKINS_API_KEY}

grafana:
  domain: https://grafana.hishop.com
  apiKey: ${GRAFANA_API_KEY}

prometheus:
  endpoints:
    - url: https://prometheus.hishop.com
      type: prometheus

datadog:
  apiKey: ${DATADOG_API_KEY}
  appKey: ${DATADOG_APP_KEY}
