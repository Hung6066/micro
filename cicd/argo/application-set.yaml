apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: his-hope-application-set
  namespace: argocd
  labels:
    app.kubernetes.io/name: his-hope-application-set
    app.kubernetes.io/component: application-set
    app.kubernetes.io/part-of: his-hope
spec:
  description: >-
    ApplicationSet that generates ArgoCD Applications for all His.Hope
    microservices and infrastructure components.

  generators:
    - list:
        elements:
          - name: patient-service
            path: k8s/overlays/prod/patient-service
            namespace: his-hope-patient
            repoURL: https://github.com/hishop/his-hope
            targetRevision: main
          - name: identity-service
            path: k8s/overlays/prod/identity-service
            namespace: his-hope-identity
            repoURL: https://github.com/hishop/his-hope
            targetRevision: main
          - name: appointment-service
            path: k8s/overlays/prod/appointment-service
            namespace: his-hope-appointment
            repoURL: https://github.com/hishop/his-hope
            targetRevision: main
          - name: clinical-service
            path: k8s/overlays/prod/clinical-service
            namespace: his-hope-clinical
            repoURL: https://github.com/hishop/his-hope
            targetRevision: main
          - name: lab-bff
            path: k8s/overlays/prod
            namespace: his-hope
          - name: clinical-bff
            path: k8s/overlays/prod
            namespace: his-hope
          - name: infrastructure
            path: k8s/overlays/prod/infrastructure
            namespace: his-hope-infrastructure
            repoURL: https://github.com/hishop/his-hope
            targetRevision: main

  template:
    metadata:
      name: "{{name}}"
      labels:
        app.kubernetes.io/name: "{{name}}"
        app.kubernetes.io/component: application
        app.kubernetes.io/part-of: his-hope
        app.kubernetes.io/managed-by: argocd-application-set
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: his-hope
      source:
        repoURL: "{{repoURL}}"
        targetRevision: "{{targetRevision}}"
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - Validate=true
          - PruneLast=false
          - ApplyOutOfSyncOnly=true
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

  templatePatch:
    spec:
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /spec/metrics
