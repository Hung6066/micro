apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: his-hope
  namespace: argocd
  labels:
    app.kubernetes.io/name: his-hope-project
    app.kubernetes.io/component: project
    app.kubernetes.io/part-of: his-hope
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: His.Hope Hospital EMR System - Multi-service ArgoCD Project

  # Allow applications from the his-hope GitHub repository
  sourceRepos:
    - https://github.com/hishop/his-hope
    - https://github.com/hishop/his-hope-infra
    - ghcr.io/hishop/*

  # Restrict deployment to specific namespaces only
  destinations:
    - namespace: his-hope
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: linkerd
      server: https://kubernetes.default.svc
    - namespace: linkerd-viz
      server: https://kubernetes.default.svc
    - namespace: linkerd-multicluster
      server: https://kubernetes.default.svc
    - namespace: linkerd-jaeger
      server: https://kubernetes.default.svc
    - namespace: chaos-engineering
      server: https://kubernetes.default.svc
    - namespace: data-platform
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  # Cluster-scoped resources - restrict to necessary types only
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: storage.k8s.io
      kind: StorageClass

  # Namespaced resources - restrict to needed resource types
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Pod
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: networking.k8s.io
      kind: Ingress
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: autoscaling.k8s.io
      kind: VerticalPodAutoscaler
    - group: cilium.io
      kind: CiliumNetworkPolicy
    - group: cilium.io
      kind: CiliumClusterwideNetworkPolicy

  # Orphaned resources handling
  orphanedResources:
    warn: true

  # Roles with RBAC permissions
  roles:
    - name: admin
      description: Full administrative access to all His.Hope applications
      policies:
        - p, proj:his-hope:admin, applications, *, his-hope/*, allow
        - p, proj:his-hope:admin, exec, *, his-hope/*, allow
        - p, proj:his-hope:admin, logs, *, his-hope/*, allow
      groups:
        - his-hope-admins
        - his-hope-platform-team

    - name: developer
      description: Read and sync access to specific service applications
      policies:
        - p, proj:his-hope:developer, applications, get, his-hope/*, allow
        - p, proj:his-hope:developer, applications, sync, his-hope/*, allow
        - p, proj:his-hope:developer, applications, override, his-hope/*, allow
        - p, proj:his-hope:developer, logs, *, his-hope/*, allow
      groups:
        - his-hope-developers
        - his-hope-sre

    - name: viewer
      description: Read-only access to view application state and health
      policies:
        - p, proj:his-hope:viewer, applications, get, his-hope/*, allow
        - p, proj:his-hope:viewer, applications, list, his-hope/*, allow
      groups:
        - his-hope-viewers
        - his-hope-auditors

  # Signatures for verified commits
  signatureKeys:
    - keyID: his-hope-ci-bot
      description: CI/CD pipeline signing key for container images

  # Source namespaces for app-of-apps pattern
  sourceNamespaces:
    - argocd

  # Cluster resource blacklist (deny risky cluster-scoped resources)
  clusterResourceBlacklist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
