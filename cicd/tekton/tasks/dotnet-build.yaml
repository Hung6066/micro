apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: dotnet-build
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/tags: build, dotnet
    tekton.dev/displayName: .NET 8 Build
spec:
  description: >-
    Build, test, and publish a .NET 8 project with code coverage collection.
    Uses a persistent volume for NuGet package caching across pipeline runs.

  params:
    - name: PROJECT_NAME
      type: string
      description: The name of the project (e.g., patient-service)
    - name: PROJECT_PATH
      type: string
      description: Relative path to the .csproj or solution file within the source workspace
    - name: CONFIGURATION
      type: string
      description: Build configuration (Debug, Release)
      default: Release

  workspaces:
    - name: source
      description: Git repository containing the .NET source code
      mountPath: /workspace/source
    - name: output
      description: Directory to store build outputs, test results, and publish artifacts
      mountPath: /workspace/output
    - name: sslcert
      description: SSL certificate bundle for NuGet feed authentication
      mountPath: /etc/ssl/certs
      optional: true

  steps:
    - name: dotnet-restore
      image: mcr.microsoft.com/dotnet/sdk:8.0
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -euo pipefail

        NUGET_CACHE=/workspace/output/nuget-cache
        mkdir -p "$NUGET_CACHE"

        export NUGET_HTTP_CACHE_PATH="$NUGET_CACHE/http-cache"
        export NUGET_PACKAGES="$NUGET_CACHE/packages"

        dotnet restore "$(params.PROJECT_PATH)" \
          --verbosity minimal \
          --configfile nuget.config 2>&1 || \
        dotnet restore "$(params.PROJECT_PATH)" \
          --verbosity minimal 2>&1
      volumeMounts:
        - name: nuget-cache
          mountPath: /workspace/output/nuget-cache
      env:
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"

    - name: dotnet-build
      image: mcr.microsoft.com/dotnet/sdk:8.0
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -euo pipefail

        dotnet build "$(params.PROJECT_PATH)" \
          --configuration "$(params.CONFIGURATION)" \
          --no-restore \
          --verbosity minimal \
          /p:ContinuousIntegrationBuild=true \
          /p:TreatWarningsAsErrors=true
      env:
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"

    - name: dotnet-test
      image: mcr.microsoft.com/dotnet/sdk:8.0
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -euo pipefail

        TEST_RESULTS_DIR="/workspace/output/test-results"
        mkdir -p "$TEST_RESULTS_DIR"

        TEST_PROJECTS=$(find . -name "*.Tests.csproj" -type f | head -20)

        if [ -z "$TEST_PROJECTS" ]; then
          echo "ERROR: No test projects (*.Tests.csproj) found in the repository."
          echo "Test execution is required — add at least one test project or update the search pattern."
          exit 1
        fi

        FAILED_COUNT=0
        TOTAL_COUNT=0

        for test_project in $TEST_PROJECTS; do
          TOTAL_COUNT=$((TOTAL_COUNT + 1))
          PROJECT_DIR=$(basename "$(dirname "$test_project")")
          echo "[$TOTAL_COUNT] Running tests for $test_project"

          if dotnet test "$test_project" \
            --configuration "$(params.CONFIGURATION)" \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory "$TEST_RESULTS_DIR" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.CoverageFileName="coverage-${PROJECT_DIR}.xml"; then
            echo "[PASS] $test_project"
          else
            echo "[FAIL] $test_project"
            FAILED_COUNT=$((FAILED_COUNT + 1))
          fi
        done

        echo ""
        echo "========================================"
        echo " Test Results Summary"
        echo "========================================"
        echo " Total:  $TOTAL_COUNT"
        echo " Passed: $((TOTAL_COUNT - FAILED_COUNT))"
        echo " Failed: $FAILED_COUNT"
        echo "========================================"
        echo ""

        if [ "$FAILED_COUNT" -gt 0 ]; then
          echo "ERROR: $FAILED_COUNT test project(s) failed. See logs above for details."
          exit 1
        fi

        echo "All test projects passed successfully."
      env:
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"

    - name: publish-test-results
      image: mcr.microsoft.com/dotnet/sdk:8.0
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -euo pipefail

        TEST_RESULTS_DIR="/workspace/output/test-results"
        PUBLISH_DIR="/workspace/output/publish/test-results"
        mkdir -p "$PUBLISH_DIR"

        echo "Publishing test results from $TEST_RESULTS_DIR to $PUBLISH_DIR"

        # Copy all test result files (TRX, XML, coverage)
        if [ -d "$TEST_RESULTS_DIR" ]; then
          find "$TEST_RESULTS_DIR" -type f \( -name "*.trx" -o -name "*.xml" -o -name "*.cobertura" -o -name "*.json" \) \
            -exec cp {} "$PUBLISH_DIR/" \; 2>/dev/null || true

          # Generate a consolidated test report index
          REPORT_FILE="$PUBLISH_DIR/test-report.txt"
          {
            echo "His.Hope EMR - Test Results Report"
            echo "==================================="
            echo "Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Pipeline: $(params.PROJECT_NAME)"
            echo "Configuration: $(params.CONFIGURATION)"
            echo ""

            COVERAGE_FILES=$(find "$PUBLISH_DIR" -name "*.cobertura" -o -name "coverage-*.xml" | head -20)
            if [ -n "$COVERAGE_FILES" ]; then
              echo "Coverage Reports:"
              for cov_file in $COVERAGE_FILES; do
                COV_SIZE=$(wc -c < "$cov_file")
                echo "  - $(basename "$cov_file") (${COV_SIZE} bytes)"
              done
            else
              echo "No coverage reports found."
            fi

            TRX_FILES=$(find "$PUBLISH_DIR" -name "*.trx" | head -20)
            if [ -n "$TRX_FILES" ]; then
              echo ""
              echo "Test Result Files (TRX):"
              for trx in $TRX_FILES; do
                TRX_SIZE=$(wc -c < "$trx")
                echo "  - $(basename "$trx") (${TRX_SIZE} bytes)"
              done
            fi
          } > "$REPORT_FILE"

          echo "Published test results:"
          ls -lh "$PUBLISH_DIR"
        else
          echo "WARNING: No test results directory found at $TEST_RESULTS_DIR"
        fi
      env:
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"

    - name: dotnet-publish
      image: mcr.microsoft.com/dotnet/sdk:8.0
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -euo pipefail

        PUBLISH_DIR="/workspace/output/publish/$(params.PROJECT_NAME)"
        mkdir -p "$PUBLISH_DIR"

        dotnet publish "$(params.PROJECT_PATH)" \
          --configuration "$(params.CONFIGURATION)" \
          --no-build \
          --verbosity minimal \
          --output "$PUBLISH_DIR" \
          /p:VersionSuffix=$(date +%Y%m%d%H%M%S)

        echo "Published artifacts to $PUBLISH_DIR"
        ls -lh "$PUBLISH_DIR"
      env:
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"

  volumes:
    - name: nuget-cache
      persistentVolumeClaim:
        claimName: nuget-cache-pvc
