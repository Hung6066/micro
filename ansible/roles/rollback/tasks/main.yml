---
# Role: rollback — Revert a service deployment
# Usage: --extra-vars "service=patientservice [revision=3]"
# Tags: rollback

- name: Validate input
  ansible.builtin.fail:
    msg: "Missing --extra-vars: service"
  when: service is not defined

- name: List rollout history
  ansible.builtin.shell: |
    kubectl rollout history deployment/{{ service }} -n his-hope
  register: history
  changed_when: false

- name: Display history
  ansible.builtin.debug:
    msg: "{{ history.stdout_lines }}"

- name: Rollback to previous revision
  ansible.builtin.shell: |
    kubectl rollout undo deployment/{{ service }} -n his-hope \
      {% if revision is defined %}--to-revision={{ revision }}{% endif %}
  register: rollback
  when: revision is not defined or revision | int > 0

- name: Wait for rollout complete
  ansible.builtin.shell: |
    kubectl rollout status deployment/{{ service }} -n his-hope --timeout=300s
  register: rollout_status
  failed_when: rollout_status.rc != 0

- name: Verify service health after rollback
  ansible.builtin.shell: |
    # Check pod status
    kubectl get pods -l app={{ service }} -n his-hope -o wide
    
    # Quick health check
    if kubectl get svc {{ service }} -n his-hope &>/dev/null; then
      PORT=$(kubectl get svc {{ service }} -n his-hope -o jsonpath='{.spec.ports[0].port}')
      kubectl run health-check-{{ service }} --rm -i --restart=Never --image=busybox:1.36 -n his-hope -- \
        wget -qO- http://{{ service }}:${PORT}/health 2>/dev/null && echo "✅ Health OK" || echo "❌ Health FAIL"
    fi
  register: verify
  changed_when: false

- name: Show rollback result
  ansible.builtin.debug:
    msg:
      - "{{ verify.stdout }}"
      - ""
      - "✅ Rollback complete: {{ service }} reverted to revision {{ revision | default('previous') }}"

- name: Send Slack notification
  ansible.builtin.uri:
    url: "{{ slack_webhook }}"
    method: POST
    body_format: json
    body:
      text: "⚠️ ROLLBACK: {{ service }} rolled back to revision {{ revision | default('previous') }} ({{ ansible_date_time.time }})"
  when: slack_webhook | length > 0
  ignore_errors: yes
