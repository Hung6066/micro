apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: patient-service-ingress
  namespace: his-hope
spec:
  endpointSelector:
    matchLabels:
      app: patient-service
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: api-gateway
        io.kubernetes.pod.namespace: his-hope
    toPorts:
    - ports:
      - port: "5002"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        app: clinical-service
        io.kubernetes.pod.namespace: his-hope
    toPorts:
    - ports:
      - port: "5006"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        app: appointment-service
        io.kubernetes.pod.namespace: his-hope
    toPorts:
    - ports:
      - port: "5006"
        protocol: TCP
---
