name: ml-features-pipeline
runner: DataflowRunner
options:
  project: his-hope-analytics
  region: us-east1
  
pipeline:
  - name: read-patient-facts
    type: BigQueryIO
    config:
      query: |
        SELECT 
          patient_id,
          age_group,
          gender,
          total_encounters,
          total_appointments,
          chronic_conditions_count,
          allergies_count,
          days_since_last_encounter
        FROM `his-hope-analytics.patient_facts.*`
        WHERE is_active = true
  
  - name: read-clinical-facts
    type: BigQueryIO
    config:
      query: |
        SELECT 
          patient_id,
          AVG(systolic_bp_avg) as avg_systolic,
          AVG(diastolic_bp_avg) as avg_diastolic,
          COUNT(DISTINCT encounter_id) as encounter_count_90d,
          COUNT(DISTINCT diagnosis_primary_icd10) as unique_diagnoses,
          SUM(procedure_count) as total_procedures
        FROM `his-hope-analytics.clinical_facts.*`
        WHERE encounter_date >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 90 DAY)
        GROUP BY patient_id
  
  - name: join-features
    type: CoGroupByKey
    config:
      key: patient_id
  
  - name: compute-readmission-features
    type: ParDo
    config:
      fn: compute_features
      output_features:
        - age_group_encoded
        - gender_encoded
        - encounter_frequency_30d
        - encounter_frequency_90d
        - chronic_condition_count
        - avg_systolic_bp
        - avg_diastolic_bp
        - unique_diagnosis_count
        - recent_procedure_count
        - appointment_no_show_rate
        - appointment_lead_time_avg
  
  - name: write-to-feature-store
    type: VertexAIFeatureStoreIO
    config:
      feature_store: his-hope
      entity_type: patient
      feature_ids:
        - encounter_frequency_30d
        - encounter_frequency_90d
        - chronic_condition_count
        - avg_systolic_bp
        - avg_diastolic_bp
        - unique_diagnosis_count
        - appointment_no_show_rate
