server {
    listen 8080;
    server_name _;

    # Docker DNS resolver for dynamic service discovery
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Angular localized build under /en/
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    charset utf-8;

    # ========================================================
    # SECURITY HEADERS (HIPAA compliance — strict nonce-based CSP)
    # ========================================================
    set $csp_nonce $request_id;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Strict nonce-based CSP
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'nonce-$csp_nonce' 'strict-dynamic' 'unsafe-inline' 'unsafe-eval' https: http:;
        style-src 'self' 'unsafe-inline';
        font-src 'self';
        img-src 'self' data: blob:;
        connect-src 'self' ws:;
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
        upgrade-insecure-requests;
        block-all-mixed-content;
        report-uri /api/v1/security/csp-report;
    " always;

    # Silently accept CSP reports (return 204 to avoid 404 errors)
    location /api/v1/security/csp-report {
        access_log off;
        return 204;
    }

    # Cross-Origin isolation
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Cache control — SPA should not cache
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # CSP nonce injection into Angular's index.html
    sub_filter_once off;
    sub_filter '<script' '<script nonce="$csp_nonce"';
    sub_filter_types text/html;

    # ========================================================
    # API PROXY
    # ========================================================
    location /api/ {
        set $upstream_apigateway http://apigateway:5000;
        proxy_pass $upstream_apigateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ========================================================
    # SIGNALR HUB PROXY
    # ========================================================
    location /hubs/ {
        set $upstream_apigateway http://apigateway:5000;
        proxy_pass $upstream_apigateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ========================================================
    # FAVICON — serve from root (404 fallback to prevent errors)
    # ========================================================
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    location = /en/favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # ========================================================
    # STATIC ASSETS (long-term cache with immutable)
    # ========================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ========================================================
    # SPA FALLBACK — serve Angular's index.html for all routes
    # NOTE: Do NOT use $uri/ here — root directory has no index.html,
    # so $uri/ would return 403 before reaching the fallback.
    # ========================================================
    location / {
        try_files $uri /en/index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
